site_name: TableTop
site_description: >-
  ROS 2 platform for controlling Universal Robots UR5e arms in a monkey
  electrophysiology research rig.
repo_url: https://github.com/jazlab/tabletop
repo_name: jazlab/tabletop
docs_dir: docs
# Build artifacts go to ./site (git-ignore this directory).
site_dir: site
# Not strict: griffe emits docstring warnings for ROS node parameters that are
# documented in `Args:`/`Parameters:` sections but read via self.param() rather
# than being function arguments. These are intentional docs, not site errors.
# Internal links/nav are still validated (run `mkdocs build --strict` to also
# fail on those griffe warnings).
strict: false

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # griffe statically analyses these source trees, so no ROS /
          # hardware imports are needed to build the API reference.
          paths:
            - src
            - src/ros/tabletop/tabletop_rig
            - src/ros/tabletop/tabletop_tasks
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Getting Started:
      - Setup: getting-started/setup.md
      - Usage: getting-started/usage.md
  - Architecture: architecture.md
  - Guide:
      - CLI & Tooling: guide/cli.md
      - Configuration: guide/configuration.md
      - Tasks & Experiments: guide/tasks.md
      - Hardware & Safety: guide/hardware.md
      - Troubleshooting: guide/troubleshooting.md
  - API Reference:
      - Overview: reference/index.md
      - tabletop_py: reference/tabletop_py.md
      - tabletop_rig: reference/tabletop_rig.md
      - tabletop_tasks: reference/tabletop_tasks.md
  - Known Issues: known-issues.md
