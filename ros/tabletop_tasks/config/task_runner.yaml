/commander:
  ros__parameters:
    default_service_wait_timeout: 5.0
    default_service_call_timeout: 2.0

    state_machine_period: 1.0
    max_plan_attempts: 5
    max_execution_attempts: 3
    max_reset_attempts: 3

    dashboard:
      installation: default.installation
      program: external_control.urp
      connect_timeout: 5.0

    planning:
      group_name: ur_manipulator
      pose_link: eef
      pipeline: ["ompl_rrt_star", "ompl_rrtc"]

    named_waypoints:
      init:
        header:
          frame_id: world
        pose:
          position:
            x: 0.1
            y: 0.1
            z: 0.8
          orientation:
            roll: 0.0
            pitch: 0.0
            yaw: 1.5707

      object_area:
        header:
          frame_id: world
        pose:
          position:
            x: 0.3
            y: 0.6
            z: 0.6
          orientation:
            roll: 0.0
            pitch: 0.0
            yaw: 1.5707

      object_grab:
