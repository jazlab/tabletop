tasks:
  - class: ForagingTask
    kwargs:
      fixation_duration_sec: 0.5
      fixation_timeout_sec: 5.0
      stimulus_duration_sec: 0.5
      delay_duration_sec: 0.5
      response_timeout_sec: 5.0
      reward_duration_sec: 0.1
      reveal_duration_sec: 0.5
      trial_generator:
        class: RandomChoice
        kwargs:
          object_ids:
            - simple_object
          poses:
            - position: [-0.2, -0.5, 0.9]
              rpy: [0.4, -0.1, -1.5707]
            - position: [0.2, -0.5, 0.9]
              rpy: [-0.4, 0.1, -1.5707]
          num_trials: 10
