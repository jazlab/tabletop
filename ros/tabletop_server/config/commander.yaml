# /**:
#   ros__parameters:
#     robot_description_planning:
#       default_robot_padding: 0.0

/commander:
  ros__parameters:
    exit_on_error: false

    max_workers: 4

    dashboard:
      installation: default.installation
      program: external_control.urp

    teensy:
      spin_period: 0.05
      arm_door_timeout: 2.0

    flic:
      spin_period: 0.05

    planning:
      max_attempts: 5
      group_name: ur_manipulator
      default_pipeline: ompl_aps_rrt_star
      linear_pipeline: pilz_lin
      planning_link: eef
      position_tolerance: 0.01
      orientation_tolerance: 0.02
      use_euler_tolerance: true
      idle_state: ready_for_action
      pre_present_state: pre_present
      pre_fetch_offset: [0.0, 0.02, -0.05]
      pre_attach_offset: [0.0, 0.02, 0.0]
      post_attach_offset: [0.0, -0.075, 0.0]
      post_fetch_offset: [0.0, -0.075, -0.15]
      pre_present_pose:
        position: [0.9525, 0.4, 0.6]
        rpy: [0.0, 0.0, -1.5707]

    execution:
      max_attempts: 1
      totg:
        velocity_scaling_factor: 0.7
        acceleration_scaling_factor: 1.0
        resample_dt: 0.01
        min_angle_change: 0.001

    trajectory_cache:
      use_cached_trajectories: true
      freeze_cache: false
      kwargs:
        path: /root/ws/src/tabletop/ros/trajectory_cache/
        robot_state_tolerance: 0.03 # radians
        position_tolerance: 0.03 # meters
        orientation_tolerance: 0.05 # radians
        use_euler_tolerance: true
        max_trajectories: 5
        new_cache: false

    link_padding:
      base_link_inertia: 0.03
      shoulder_link: 0.03
      upper_arm_link: 0.03
      forearm_link: 0.03
      wrist_1_link: 0.03
      wrist_2_link: 0.03
      wrist_3_link: 0.01

    object_manipulation:
      allowed_collisions:
        sphere: rig
      touch_links:
        - eef_link
      mount_ids:
        - rig

    planning_scene:
      dir: /root/ws/src/tabletop/ros/planning_scene/
      use_saved_scene: true
      planes:
        floor:
          coef: [0.0, 0.0, 1.0, 0.0]
          pose_stamped:
            position: [0.0, 0.0, 0.0]
        front_wall:
          coef: [0.0, 1.0, 0.0, 0.0635]
          pose_stamped:
            position: [0.0, 0.0, 0.0]
        back_wall:
          coef: [0.0, 1.0, 0.0, 1.8923]
          pose_stamped:
            position: [0.0, 0.0, 0.0]
        left_wall:
          coef: [1.0, 0.0, 0.0, 0.0381]
          pose_stamped:
            position: [0.0, 0.0, 0.0]
        right_wall:
          coef: [1.0, 0.0, 0.0, 1.8669]
          pose_stamped:
            position: [0.0, 0.0, 0.0]
      primitives:
        left_robot_box:
          type: BOX
          dimensions: [0.8, 0.4, 0.3]
          pose_stamped:
            position: [0.38, 1.0625, 0.46]
          color: [1.0, 0.0, 0.0, 0.2]
        robot_platform:
          type: BOX
          dimensions: [0.92, 0.92, 0.31]
          pose_stamped:
            position: [0.9525, 1.0625, 0.155]
          allowed_collision_ids:
            - base_link_inertia
          color: [1.0, 1.0, 1.0, 1.0]
        box_0:
          type: BOX
          dimensions: [0.5, 0.4, 1.9812]
          pose_stamped:
            position: [1.655, 0.2, 0.9906]
          color: [1.0, 0.0, 0.0, 0.2]
      rig_meshes:
        rig:
          pose_stamped:
            position: [0.0, 0.0, 0.0]
          path: $(find-pkg-share tabletop_moveit_config)/meshes/rig/rig.dae
          simplification: bounding_primitive
          allowed_collision_ids:
            - base_link_inertia
          color: [1.0, 1.0, 1.0, 0.5]
      object_meshes:
        path: $(find-pkg-share tabletop_moveit_config)/meshes/objects/
