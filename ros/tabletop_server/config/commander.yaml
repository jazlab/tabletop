/commander:
  ros__parameters:
    max_plan_attempts: 5
    max_execution_attempts: 3

    dashboard:
      installation: default.installation
      program: external_control.urp

    teensy:
      spin_period: 0.05
      arm_door_timeout: 2.0

    flic:
      spin_period: 0.05

    planning:
      group_name: ur_manipulator
      default_pipeline: ompl_aps_rrtc
      linear_pipeline: pilz_lin

      planning_link: eef
      object_touch_links:
        - eef_link
      object_mount_ids:
        - rig
      idle_state: ready_for_action
      pre_fetch_offset: [-0.02, 0.0, -0.01]
      pre_attach_offset: [-0.02, 0.0, 0.0]
      post_attach_offset: [0.0, -0.07, 0.0]
      post_fetch_offset: [0.0, -0.07, -0.2]

    trajectory_cache:
      use_cached_trajectories: true
      kwargs:
        filename: /root/ws/src/tabletop/ros/trajectory_cache
        robot_state_tolerance: [0.01, 0.01, 0.01, 0.05, 0.05, 0.05] # radians
        position_tolerance: 0.02 # meters
        orientation_tolerance: 0.05 # radians (~3 degrees)
        max_trajectories: 2
        clear_cache: true

    planning_scene:
      dir: /root/ws/src/tabletop/ros/planning_scene/
      use_saved_scene: true
      planes:
        floor:
          coef: [0.0, 0.0, 1.0, 0.0]
          allowed_collision_ids:
            - base_link_inertia
            - sphere

      primitives:
        left_robot_box:
          type: BOX
          dimensions: [0.8, 0.4, 0.6]
          pose_stamped:
            position: [0.3583, 1.0832, 0.5685]
          allowed_collision_ids:
            - sphere
          color: [0.0, 0.0, 1.0, 0.5]
        # divider:
        #   type: BOX
        #   dimensions: [0.05, 1.0, 1.0]
        #   pose_stamped:
        #     position: [0.9335, 1.1462, 0.7685]
        #   allowed_collision_ids:
        #     - sphere
        #   color: [0.0, 0.0, 0.0, 0.2]

      rig_meshes:
        rig:
          path: $(find-pkg-share tabletop_moveit_config)/meshes/rig/rig.dae
          scale: 1.0
          simplification: convex_hull
          allowed_collision_ids:
            - base_link_inertia
            - sphere
          pose_stamped:
            position: [0.0, 0.0, 0.0]
          color: pink

      object_meshes:
        path: $(find-pkg-share tabletop_moveit_config)/meshes/objects/
        origin: [0.2809, 0.7632, 1.2104]
        delta: [0.1489, 0.314, 0.0]
        common_kwargs:
          allowed_collision_ids:
            - sphere
          pose_stamped:
            rpy: [0.0, 0.0, -1.5707]
          simplification: convex_hull
          color: orange
        object_kwargs:
          small_object_0:
            color: [1.0, 0.0, 0.0, 1.0] # red
            idx: [0, 0]
          small_object_1:
            color: [0.0, 1.0, 0.0, 1.0] # green
            idx: [0, 1]
          small_object_2:
            color: [0.0, 0.0, 1.0, 1.0] # blue
            idx: [0, 2]
          small_object_3:
