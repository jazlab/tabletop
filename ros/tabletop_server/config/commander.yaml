/commander:
  ros__parameters:
    simulate: true

    default_service_wait_timeout: 5.0
    default_service_call_timeout: 2.0

    max_plan_attempts: 5
    max_execution_attempts: 3

    dashboard:
      installation: default.installation
      program: external_control.urp
      init_timeout: 60.0

    rig:
      init_timeout: 60.0

    teensy:
      spin_period: 0.05
      arm_door_timeout: 2.0

    flic:
      spin_period: 0.05

    planning:
      group_name: ur_manipulator
      default_pipeline: ompl_aps_rrtc
      linear_pipeline: pilz_lin

      eef_link: eef
      object_touch_links:
        - eef_link
      object_mount_ids:
        - rig
      idle_state: semi
      pre_fetch_offset: [-0.02, 0.0, -0.01]
      pre_attach_offset: [-0.02, 0.0, 0.0]
      post_attach_offset: [0.0, -0.10, 0.0]

      trajectory_cache:
        filename: /root/ws/src/tabletop/ros/trajectory_cache
        robot_state_tolerance: [0.01, 0.01, 0.01, 0.05, 0.05, 0.05] # radians
        position_tolerance: 0.02 # meters
        orientation_tolerance: 0.05 # radians (~3 degrees)
        enabled: true
        clear_db: true

    planning_scene:
      planes:
        floor:
          coef: [0.0, 0.0, 1.0, 0.309]
          allowed_collision_ids:
            - base_link_inertia
            - sphere

      # primitives:
      #   left_robot_box:
      #     type: BOX
      #     dimensions: [0.8, 0.4, 0.6]
      #     pose_stamped:
      #       position: [0.2945, 1.1178, 0.609]
      #     allowed_collision_ids:
      #       - sphere
      #     color: blue
      #   robot_platform:
      #     type: BOX
      #     dimensions: [0.9135, 0.9135, 0.005]
      #     pose_stamped:
      #       position: [0.9144, 1.1178, 0.3065]
      #     allowed_collision_ids:
      #       - base_link_inertia
      #       - sphere
      #     color: pink

      rig_meshes:
        rig:
          path: $(find-pkg-share tabletop_moveit_config)/meshes/rig/rig.dae
          scale: 1.0
          simplification: convex_hull
          allowed_collision_ids:
            - base_link_inertia
            - sphere
          pose_stamped:
            position: [0.0, 0.0, 0.0]
          color: pink

      object_meshes:
        path: $(find-pkg-share tabletop_moveit_config)/meshes/objects/
        origin: [0.2464, 0.7993, 1.25]
        delta: [0.1489, 0.3771, 0.0]
        common_kwargs:
          allowed_collision_ids:
            - sphere
          pose_stamped:
            rpy: [0.0, 0.0, -1.5707]
          simplification: convex_hull
          color: orange
        object_kwargs:
          simple_object_0:
            color: [1.0, 0.0, 0.0, 1.0] # red
            idx: [0, 0]
          simple_object_1:
            color: [0.0, 1.0, 0.0, 1.0] # green
            idx: [0, 1]
