name: tabletop

services:
  robot:
    image: universalrobots/ursim_e-series
    volumes:
      - ./ursim/urcaps:/urcaps
      - ./ursim/programs:/ursim/programs
    networks:
      net:
        ipv4_address: 192.168.13.10
  server:
    build:
      context: .
      dockerfile: ./Dockerfiles/server
    volumes:
      - ./:${HOME}/ws/
    depends_on:
      - robot
    command: bash
    tty: true
    develop:
      watch:
        - path: ./
          action: sync+restart
          target: /root/ws/src/tabletop/
    networks:
      net:
        ipv4_address: 192.168.13.11

networks:
  net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.13.0/24
