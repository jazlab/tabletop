name: tabletop

services:
  devcontainer:
    extends:
      file: ../compose.yaml
      service: server
    # privileged: true
    # volumes:
    #   - /dev:/dev
    hostname: devcontainer
    # ports:
    #   - 8008:8008 # PlatformIO HTTP port
    command: bash -c
      "git config --global --add safe.directory /root/ws/src/tabletop
      && git config --global --add safe.directory /root/ws/src/moveit2
      && sleep infinity"

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
