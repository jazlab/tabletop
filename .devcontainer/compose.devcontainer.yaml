name: tabletop

services:
  devcontainer:
    build:
      context: .
      pull: true
    volumes:
      - ../../..:/root/ws
    hostname: devcontainer
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.101

  # devcontainer_x11:
  #   extends: devcontainer
  #   volumes:
  #     - /tmp/.X11-unix:/tmp/.X11-unix
  #   environment:
  #     - DISPLAY=$DISPLAY

  # devcontainer_novnc:
  #   extends: devcontainer
  #   environment:
  #     - DISPLAY=novnc:0.0

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
