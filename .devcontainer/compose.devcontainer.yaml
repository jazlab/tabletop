name: tabletop

services:
  devcontainer:
    extends:
      file: ../compose.yaml
      service: server_base
    privileged: true
    volumes:
      - ../../..:/root/ws
      - ./starship.toml:/root/.config/starship.toml
      - /dev:/dev
      - /dev/shm:/dev/shm
    ports:
      - 8008:8008 # PlatformIO HTTP port
    command: sleep infinity

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
