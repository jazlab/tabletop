name: tabletop

services:
  devcontainer:
    extends:
      file: ../compose.yaml
      service: server_base
    privileged: true
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
    environment:
      - DISPLAY=$DISPLAY
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.12
    hostname: devcontainer
    ports:
      - 8008:8008 # PlatformIO HTTP port
    command: sleep infinity

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
