name: tabletop

services:
  devcontainer:
    build:
      context: .
    volumes:
      - ../../..:/root/ws
      # - /tmp/.X11-unix:/tmp/.X11-unix
    hostname: devcontainer
    networks:
      tabletop_net:
        ipv4_address: 192.168.13.101
    # environment:
      # - DISPLAY=novnc:0.0
      # - DISPLAY=$DISPLAY

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.13.0/24