name: tabletop

x-common: &common
  ipc: host
  network_mode: host
  volumes:
    - /etc/localtime:/etc/localtime:ro

x-autoheal: &autoheal
  depends_on:
    - autoheal
  labels:
    autoheal-tabletop: true

x-novnc: &novnc
  depends_on:
    novnc:
      condition: service_healthy
  environment:
    - DISPLAY=:20.0

services:
  autoheal:
    container_name: tabletop-autoheal
    image: willfarrell/autoheal:latest
    pull_policy: always
    network_mode: none
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-tabletop

  novnc:
    <<: [*common, *autoheal]
    container_name: tabletop-novnc
    build:
      context: ./docker/novnc
      pull: true
    restart: unless-stopped
    # pull_policy: build
    # networks:
    #   tabletop_net:
    #     ipv4_address: 192.168.12.100
    # hostname: novnc
    # ports:
    #   - 8080:8080
    environment:
      - DISPLAY=:20.0
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - WINDOW_MANAGER=dwm

  ursim:
    <<: [*common, *novnc]
    container_name: tabletop-ursim
    image: universalrobots/ursim_e-series:latest
    pull_policy: always
    # networks:
    #   tabletop_net:
    #     ipv4_address: 192.168.12.20
    # hostname: ursim
    restart: unless-stopped
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - ROBOT_MODEL=ur5e
    init: true
    entrypoint: ["/entrypoint.sh"]

  flicd:
    <<: [*common, *autoheal]
    container_name: tabletop-flicd
    image: ubuntu:latest
    pull_policy: always
    # privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./docker/flicd:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    init: true
    command: /app/entrypoint.sh
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s

  server-base:
    <<: *common
    build:
      context: .
      dockerfile: ./docker/server/Dockerfile
      target: base
      pull: true
      args:
        - ROS_DISTRO=jazzy
        - USER_NAME=$USER_NAME
        - USER_UID=$USER_UID
        - USER_GID=$USER_GID
        - USE_NVIDIA=$USE_NVIDIA
        - CUDA_VERSION=$CUDA_VERSION
    # pull_policy: build
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - type: bind
        source: .
        target: /home/$USER_NAME/tabletop
        consistency: cached
      - venv:/home/$USER_NAME/tabletop/.venv
    init: true
    command: sleep infinity

  foxglove:
    container_name: tabletop-foxglove
    extends: server-base
    command: tt-launch foxglove
    restart: unless-stopped

  optitrack:
    container_name: tabletop-optitrack
    extends: server-base
    command: bash -c "tt-launch optitrack"
    restart: unless-stopped

  flir:
    container_name: tabletop-flir
    extends: server-base
    command: bash -c "tt-launch flir"
    restart: unless-stopped
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5

  teensy:
    container_name: tabletop-teensy
    extends: server-base
    command: bash -c "tt-launch teensy simulate:=false"
    restart: unless-stopped
    devices:
      - /dev/ttyACM0

  mock-teensy:
    container_name: tabletop-teensy
    extends: server-base
    command: bash -c "tt-launch teensy simulate:=true"
    restart: unless-stopped

  flic:
    container_name: tabletop-flic
    extends: server-base
    command: bash -c "tt-launch flic"
    restart: unless-stopped
    depends_on:
      flicd:
        condition: service_healthy
        restart: true

  server:
    <<: *novnc
    container_name: tabletop-server
    extends: server-base
    runtime: $CONTAINER_RUNTIME
    # networks:
    #   tabletop_net:
    #     ipv4_address: 192.168.12.10
    # hostname: server
    # ports:
    #   - 50001:50001
    #   - 50002:50002
    #   - 50003:50003
    #   - 50004:50004
    #   - 8765:8765
    # shm_size: 2g
    # ipc: host
    # privileged: true
    # Uncomment the following section if you plan on connecting a teensy after starting the container
    # device_cgroup_rules:
    #   - c 166:* rmw
    #   - c 239:* rmw
    # Uncomment the following section if a teensy is connected before starting the container
    devices:
      - /dev/ttyACM0
      # - /dev/flir/015216DC
      # - /dev/flir/0156732C
      # - /dev/flir/0156732D
      # - /dev/flir/01629EC9
      # - /dev/flir/01629ECB
      # - /dev/flir/01629ECD
    volumes:
      # - /dev:/dev
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
      # - ~/.config/pulse:/home/$USER_NAME/.config/pulse:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
      # - QT_X11_NO_MITSHM=1
      # - PULSE_COOKIE=/tmp/pulseaudio.cookie

  dev:
    container_name: tabletop-dev
    extends: server
    build:
      target: dev
    volumes:
      - ~/.vimrc:/home/$USER_NAME/.vimrc
      - ~/.config/nvim:/home/$USER_NAME/.config/nvim
      - ~/.config/starship.toml:/home/$USER_NAME/.config/starship.toml
      - $KITTY_LISTEN_ON_MNT
    environment:
      - SHELL=/bin/bash
      - KITTY_LISTEN_ON=$KITTY_LISTEN_ON_CONTAINER

volumes:
  venv:
