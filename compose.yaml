name: tabletop

services:
  novnc:
    build:
      context: ./novnc
      pull: true
    pull_policy: build
    ports:
      - 8080:8080
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.12
    restart: on-failure
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s
    environment:
      # Adjust to your screen size
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=824
      - RUN_XTERM=no
      - WINDOW_MANAGER=DWM

  robot:
    depends_on:
      novnc:
        condition: service_healthy
    restart: unless-stopped
    image: universalrobots/ursim_e-series
    pull_policy: always
    platform: linux/amd64
    pid: host
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./ur_robot/entrypoint.sh:/entrypoint.sh
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.10
    hostname: robot
    environment:
      - DISPLAY=novnc:0.0
      - ROBOT_MODEL=ur5e

  robot_x11:
    extends: robot
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/dri:/dev/dri
    environment:
      - DISPLAY=$DISPLAY
    
  server_mac:
    build:
      context: ./ros
      pull: true
    pull_policy: build
    ports:
      - 50001:50001
      - 50002:50002
      - 50003:50003
      - 50004:50004
    volumes:
      - ../..:/root/ws
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.11
    hostname: server
    environment:
      - ROS_LOG_DIR=/root/ws/src/tabletop/log
      - DISPLAY=novnc:0.0
      - LAUNCH_COMMAND=${LAUNCH_COMMAND:-
        ros2 launch tabletop_server server.launch.py use_mock_teensy:=true
        robot_ip:=${ROBOT_IP:-192.168.12.10}
        reverse_ip:=${REVERSE_IP:-192.168.12.11}}
    command: bash -c
      "/root/ws/src/tabletop/scripts/build.sh
      && source /opt/ros/jazzy/setup.bash
      && source /root/ws/install/setup.bash
      && $$LAUNCH_COMMAND"

  server:
    extends: server_mac
    depends_on:
      novnc:
        condition: service_healthy
    environment:
      - LAUNCH_COMMAND=${LAUNCH_COMMAND:-
        ros2 launch tabletop_server server.launch.py
        robot_ip:=${ROBOT_IP:-192.168.12.10}
        reverse_ip:=${REVERSE_IP:-192.168.12.11}}
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    

  server_x11:
    extends: server
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/dri:/dev/dri
    environment:
      - DISPLAY=$DISPLAY
    image: tabletop-server

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
