name: tabletop

services:
  autoheal:
    container_name: tabletop-autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-tabletop
    image: willfarrell/autoheal:latest
    network_mode: none
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock

  novnc:
    container_name: tabletop-novnc
    build:
      context: ./docker/novnc
      pull: true
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.100
    hostname: novnc
    ports:
      - 8080:8080
    environment:
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - WINDOW_MANAGER=dwm
    depends_on:
      - autoheal
    labels:
      autoheal-tabletop: true

  ursim:
    container_name: tabletop-ursim
    image: universalrobots/ursim_e-series:latest
    pull_policy: always
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.20
    hostname: ursim
    restart: unless-stopped
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - ROBOT_MODEL=ur5e
      - DISPLAY=novnc:0.0
    init: true
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      novnc:
        condition: service_healthy

  flic:
    container_name: tabletop-flic
    image: ubuntu:latest
    pull_policy: always
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./docker/flic:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    init: true
    command: /app/entrypoint.sh
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s
    depends_on:
      - autoheal
    labels:
      autoheal-tabletop: true

  server-base:
    build:
      context: .
      dockerfile: ./docker/server/Dockerfile
      target: base
      pull: true
      args:
        - ROS_DISTRO=jazzy
        - USER_NAME=$USER_NAME
        - USER_UID=$USER_UID
        - USER_GID=$USER_GID
        - USE_NVIDIA=$USE_NVIDIA
        - CUDA_VERSION=$CUDA_VERSION
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - type: bind
        source: ./
        target: /home/$USER_NAME/tabletop
        consistency: cached
      - /home/$USER_NAME/tabletop/.venv
    working_dir: /home/$USER_NAME/tabletop
    init: true
    command: sleep infinity

  # TODO: Docker Desktop now supports host network mode! Let's see if it's worth converting everything
  optitrack:
    container_name: tabletop-optitrack
    extends: server-base
    network_mode: host
    command: bash -c "source \$TABLETOP_DIR/setup.bash && ros2 launch mocap4r2_optitrack_driver optitrack2.launch.py"

  server:
    container_name: tabletop-server
    extends: server-base
    runtime: $CONTAINER_RUNTIME
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.10
    hostname: server
    ports:
      - 50001:50001
      - 50002:50002
      - 50003:50003
      - 50004:50004
      - 8765:8765
    shm_size: 2g
    # ipc: host
    privileged: true
    volumes:
      - /dev:/dev
      - ${PULSE_SERVER_HOST:-/dev/null}:/tmp/pulseaudio.socket
      - ${PULSE_COOKIE_HOST:-/dev/null}:/home/$USER_NAME/.config/pulse/cookie
      # - ~/.config/pulse:/home/$USER_NAME/.config/pulse:ro
    environment:
      - DISPLAY=novnc:0.0
      # - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=unix:/tmp/pulseaudio.socket
      # - PULSE_COOKIE=/tmp/pulseaudio.cookie
    depends_on:
      novnc:
        condition: service_healthy

  server-dev:
    extends: server
    build:
      target: dev
    volumes:
      - ~/.vimrc:/home/$USER_NAME/.vimrc
      - ~/.config/nvim:/home/$USER_NAME/.config/nvim
      - ~/.config/starship.toml:/home/$USER_NAME/.config/starship.toml
      - ${KITTY_LISTEN_ON_HOST:-/dev/null}:/tmp/kitty
    environment:
      - SHELL=/bin/bash
      - KITTY_LISTEN_ON=${KITTY_LISTEN_ON_HOST:+unix:/tmp/kitty}

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    # driver_opts:
    #   com.docker.network.bridge.gateway_mode_ipv4: routed
    ipam:
      config:
        - subnet: 192.168.12.0/24
