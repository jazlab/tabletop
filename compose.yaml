name: tabletop

x-common: &common
  ipc: host
  network_mode: host

services:
  novnc-image-builder:
    profiles: [ image-builder ]
    image: jazlabtabletop/novnc
    build:
      context: ./docker/novnc

  ros-image-builder:
    profiles: [ image-builder ]
    image: jazlabtabletop/ros-base
    build:
      context: .
      dockerfile: ./docker/ros/Dockerfile
      args:
        - USER_NAME=$USER_NAME
        - USER_UID=$USER_UID
        - USER_GID=$USER_GID

  autoheal:
    container_name: tabletop-autoheal
    profiles: [ real, sim, ursim ]
    image: willfarrell/autoheal@sha256:ae1599ab171135fe3d5b779d84ece28f5cac95137e0e508ca49c62ccd740785e
    network_mode: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal-tabletop
    restart: unless-stopped

  novnc:
    <<: *common
    container_name: tabletop-novnc
    profiles: [ real, sim, ursim ]
    image: jazlabtabletop/novnc
    environment:
      - PORT=8080
      - DISPLAY=$NOVNC_DISPLAY
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - WINDOW_MANAGER=dwm
    labels:
      autoheal-tabletop: true
    depends_on:
      - autoheal
    restart: unless-stopped

  ursim:
    <<: *common
    container_name: tabletop-ursim
    profiles: [ ursim ]
    image: universalrobots/ursim_e-series@sha256:bb2dd54b2c187af971e1fd2ac8a5752e88fb7f36cac0b0c375c90eb6262abee8
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROBOT_MODEL=ur5e
    depends_on:
      novnc:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    init: true
    entrypoint: [ /entrypoint.sh ]

  flicd:
    <<: *common
    container_name: tabletop-flicd
    profiles: [ deprecated ]
    image: ubuntu@sha256:cd1dba651b3080c3686ecf4e3c4220f026b521fb76978881737d24f200828b2b
    labels:
      autoheal-tabletop: true
    volumes:
      - ./docker/flicd:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    depends_on: [ autoheal ]
    healthcheck:
      disable: false
      test: [ CMD, /app/healthcheck.sh ]
      interval: 2s
      timeout: 1s
      start_period: 5s
      start_interval: 1s
      retries: 1
    cap_add:
      - NET_ADMIN
    init: true
    # stop_signal: SIGINT
    command: /app/entrypoint.sh

  ros-base:
    <<: *common
    image: jazlabtabletop/ros-base
    container_name: tabletop-ros-base
    profiles: [ builder ]
    volumes:
      - type: bind
        source: .
        target: /tabletop
        consistency: $BIND_CONSISTENCY
    environment:
      - UV_EXTRA=$UV_EXTRA
    stop_signal: SIGINT
    working_dir: /tabletop
    command: tt-build --all

  microros-builder:
    extends: ros-base
    container_name: tabletop-microros-builder
    volumes:
      - /dev:/dev
      - platformio-core:/platformio
    privileged: true
    command: tt-microros-build

  foxglove:
    extends: ros-base
    container_name: tabletop-foxglove
    profiles: !override [ real, sim ]
    restart: unless-stopped
    command: tt-launch foxglove

  rviz:
    extends: ros-base
    container_name: tabletop-rviz
    profiles: !override [ real, sim ]
    environment:
      - DISPLAY=$NOVNC_DISPLAY
    depends_on:
      novnc:
        condition: service_healthy
    restart: unless-stopped
    command: tt-launch rviz

  ur:
    extends: ros-base
    container_name: tabletop-ur
    profiles: !override [ real ]
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      memlock: -1
    restart: unless-stopped
    command: tt-launch dual_ur robot_mode:=real

  ur-mock:
    extends: ros-base
    container_name: tabletop-ur-mock
    profiles: !override [ sim ]
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      memlock: -1
    restart: unless-stopped
    command: tt-launch dual_ur robot_mode:=mock

  optitrack:
    extends: ros-base
    container_name: tabletop-optitrack
    profiles: !override [ real ]
    restart: unless-stopped
    command: tt-launch optitrack

  flir:
    extends: ros-base
    container_name: tabletop-flir
    # TODO: Change to real profile
    profiles: !override [ flir ]
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5
    # volumes:
    #   - /dev:/dev
    # privileged: true
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
    #   - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
    # cpus: 8 # Limit cpu usage
    # runtime: $COMMANDER_RUNTIME
    restart: unless-stopped
    command: tt-launch flir

  teensy:
    extends: ros-base
    container_name: tabletop-teensy
    profiles: !override [ real ]
    devices:
      - $TEENSY_DEV
    restart: unless-stopped
    command: tt-launch teensy simulate:=false micro_ros_device:=$TEENSY_DEV

  teensy-sim:
    extends: ros-base
    container_name: tabletop-teensy-sim
    profiles: !override [ sim ]
    restart: unless-stopped
    command: tt-launch teensy simulate:=true

  flic:
    extends: ros-base
    container_name: tabletop-flic
    profiles: !override [ real ]
    cap_add:
      - NET_ADMIN
    # flicd no longer needed after scapy implementation
    # depends_on:
    #   flicd:
    #     condition: service_healthy
    #     # condition: service_started
    #     restart: true
    restart: unless-stopped
    command: tt-launch flic simulate:=false

  flic-sim:
    container_name: tabletop-flic-sim
    extends: ros-base
    profiles: !override [ sim ]
    restart: unless-stopped
    command: tt-launch flic simulate:=true

  eyelink:
    extends: ros-base
    container_name: tabletop-eyelink
    profiles: !override [ real ]
    cap_add:
      - SYS_NICE # TODO: see if needed
    ulimits:
      rtprio: 99
    volumes:
      - $ROS_BAG_DIR_MNT
    environment:
      - ROS_BAG_DIR=$ROS_BAG_DIR_CONTAINER
    restart: unless-stopped
    command: tt-launch eyelink simulate:=false

  eyelink-sim:
    extends: ros-base
    container_name: tabletop-eyelink-sim
    profiles: !override [ sim ]
    restart: unless-stopped
    command: tt-launch eyelink simulate:=true

  commander:
    extends: ros-base
    container_name: tabletop-commander
    profiles: !override [ commander ]
    runtime: $COMMANDER_RUNTIME
    volumes:
      - $ROS_BAG_DIR_MNT
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROS_BAG_DIR=$ROS_BAG_DIR_CONTAINER
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
    stop_grace_period: 40s
    command: tt-launch commander

  dev:
    extends: ros-base
    container_name: tabletop-dev
    profiles: !override [ dev ]
    runtime: $COMMANDER_RUNTIME
    volumes:
      - platformio-core:/platformio
      - $ROS_BAG_DIR_MNT
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROS_BAG_DIR=$ROS_BAG_DIR_CONTAINER
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
    init: true
    command: sleep infinity

volumes:
  platformio-core:
