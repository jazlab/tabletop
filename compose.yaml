name: tabletop

services:
  novnc:
    build:
      context: ./novnc
      pull: true
    ports:
      - 8080:8080
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.12
    restart: on-failure
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]  
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s
    environment:
      # Adjust to your screen size
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=824
      - RUN_XTERM=no
      - WINDOW_MANAGER=DWM

  robot:
    depends_on:
      novnc:
        condition: service_healthy
    restart: unless-stopped
    image: universalrobots/ursim_e-series
    pull_policy: always
    platform: linux/amd64
    pid: host
    volumes:
      - ./ursim/urcaps:/urcaps
      - ./ursim/programs:/ursim/programs
      - ./ursim/entrypoint.sh:/entrypoint.sh
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.10
    hostname: robot
    environment:
      - DISPLAY=novnc:0.0
      - ROBOT_MODEL=ur5e

  server:
    depends_on:
      novnc:
        condition: service_healthy
    build:
      context: ./ros/tabletop_server
      pull: true
    ports:
      - 50001:50001
      - 50002:50002
      - 50003:50003
      - 50004:50004
    volumes:
      - ../..:/root/ws
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.11
    
    hostname: server
    environment:
      - DISPLAY=novnc:0.0
      - LAUNCH_COMMAND=${LAUNCH_COMMAND:-ros2 launch tabletop_server server.launch.py}
    env_file:
      - ./env_files/server_sim.env
    command: >
      bash -c 
      "cd /root/ws
      && source /root/ws/src/tabletop/scripts/build.sh
      && $$LAUNCH_COMMAND"

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
