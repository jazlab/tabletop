name: tabletop

services:
  novnc:
    build:
      context: ./docker/novnc
      pull: true
    pull_policy: build
    ports:
      - 8080:8080
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.100
    restart: on-failure
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s
    environment:
      - DISPLAY_WIDTH=${DISPLAY_WIDTH:-1280}
      - DISPLAY_HEIGHT=${DISPLAY_HEIGHT:-824}
      - RUN_XTERM=no
      - WINDOW_MANAGER=DWM

  ursim_base:
    restart: unless-stopped
    image: universalrobots/ursim_e-series:latest
    pull_policy: always
    # platform: linux/amd64
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./ur_robot/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/entrypoint.sh"]
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.20
    hostname: ursim
    environment:
      - ROBOT_MODEL=ur5e

  ursim_novnc:
    extends: ursim_base
    depends_on:
      novnc:
        condition: service_healthy
    environment:
      - DISPLAY=novnc:0.0

  ursim:
    extends: ursim_base
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY

  server_base:
    build:
      context: ./docker/server
      pull: true
    pull_policy: build
    image: tabletop-server
    runtime: nvidia
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.10
    hostname: server
    volumes:
      - ../..:/root/ws
    ports:
      - 50001:50001
      - 50002:50002
      - 50003:50003
      - 50004:50004
    environment:
      - QT_X11_NO_MITSHM=1
      - BUILD_COMMAND=${BUILD_COMMAND:-:}
      - LAUNCH_COMMAND=${LAUNCH_COMMAND:-echo "No launch command provided, sleeping..." && sleep infinity}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: bash -c
      "$$BUILD_COMMAND
      && source /opt/ros/jazzy/setup.bash
      && source /root/ws/install/setup.bash
      && $$LAUNCH_COMMAND"

  server_novnc:
    extends: server_base
    depends_on:
      novnc:
        condition: service_healthy
    environment:
      - DISPLAY=novnc:0.0

  server:
    extends: server_base
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    # device_cgroup_rules:
    #   - c 161:* rmw
    environment:
      - DISPLAY=$DISPLAY

  flic:
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    image: ubuntu:latest
    pull_policy: always
    volumes:
      - ./flic_server:/flic_server
    environment:
      - HCI_DEV=${HCI_DEV:-hci0}
      - BD_ADDR=${BD_ADDR:-c8:c6:ac:df:da:c2}
    command: bash -c
      "/flic_server/flicd
      --db-file /flic_server/sqlite.db
      --my-bdaddr $$BD_ADDR
      --server-addr 0.0.0.0
      --server-port 5551
      --hci-dev $$HCI_DEV
      --wait-for-hci" # --wait-for-hci necessary, see musings.md

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.12.0/24
