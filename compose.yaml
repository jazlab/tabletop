name: tabletop

x-common: &common
  ipc: host
  network_mode: host

services:
  autoheal:
    container_name: tabletop-autoheal
    profiles:
      - real
      - sim
      - ursim
    image: willfarrell/autoheal:latest
    # pull_policy: always
    network_mode: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal-tabletop
    restart: unless-stopped

  novnc:
    <<: *common
    container_name: tabletop-novnc
    profiles:
      - real
      - sim
      - ursim
    image: tabletop/novnc
    build:
      context: ./docker/novnc
      pull: true
    labels:
      autoheal-tabletop: true
    environment:
      - PORT=8080
      - DISPLAY=$NOVNC_DISPLAY
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - WINDOW_MANAGER=dwm
    depends_on:
      - autoheal
    restart: unless-stopped

  ursim:
    <<: *common
    container_name: tabletop-ursim
    profiles: [ ursim ]
    image: universalrobots/ursim_e-series:latest
    # pull_policy: always
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROBOT_MODEL=ur5e
    depends_on:
      novnc:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    init: true
    entrypoint: [ /entrypoint.sh ]

  flicd:
    <<: *common
    container_name: tabletop-flicd
    profiles: [ real ]
    image: ubuntu:latest
    # pull_policy: always
    labels:
      autoheal-tabletop: true
    # privileged: true
    volumes:
      - ./docker/flicd:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    depends_on: [ autoheal ]
    healthcheck:
      disable: false
      test: [ CMD, /app/healthcheck.sh ]
      interval: 2s
      timeout: 1s
      start_period: 5s
      start_interval: 1s
      retries: 1
    cap_add:
      - NET_ADMIN
    init: true
    # stop_signal: SIGINT
    command: /app/entrypoint.sh

  ros-base:
    <<: *common
    image: tabletop/ros-base
    profiles: [ ros-build ]
    build:
      context: .
      dockerfile: ./docker/ros/base.Dockerfile
      pull: true
      args:
        - BASE_IMAGE=$ROS_BASE_IMAGE
        - USER_NAME=$USER_NAME
        - USER_UID=$USER_UID
        - USER_GID=$USER_GID
        - UV_EXTRA=$UV_EXTRA
    volumes:
      - type: bind
        source: .
        target: /tabletop
        consistency: $BIND_CONSISTENCY
      - python-venv:/tabletop/.venv
    stop_signal: SIGINT
    develop:
      watch:
        - path: ./build/last_built.txt
          action: restart
    # init: true

  foxglove:
    extends: ros-base
    container_name: tabletop-foxglove
    profiles: !override
      - real
      - sim
    restart: unless-stopped
    command: tt-launch foxglove

  rviz:
    extends: ros-base
    container_name: tabletop-rviz
    profiles: !override
      - real
      - sim
    environment:
      - DISPLAY=$NOVNC_DISPLAY
    depends_on:
      novnc:
        condition: service_healthy
    restart: unless-stopped
    command: tt-launch rviz

  ur:
    extends: ros-base
    container_name: tabletop-ur
    profiles: !override
      - real
    restart: unless-stopped
    command: tt-launch ur robot_mode:=real

  ur-mock:
    extends: ros-base
    container_name: tabletop-ur-mock
    profiles: !override
      - sim
    restart: unless-stopped
    command: tt-launch ur robot_mode:=mock

  optitrack:
    extends: ros-base
    profiles: !override
      - real
    container_name: tabletop-optitrack
    restart: unless-stopped
    command: tt-launch optitrack

  flir:
    extends: ros-base
    container_name: tabletop-flir
    profiles: !override
      - flir
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5
    cpus: 8 # Limit cpu usage
    restart: unless-stopped
    command: tt-launch flir

  teensy:
    extends: ros-base
    container_name: tabletop-teensy
    profiles: !override
      - real
    devices:
      - $TEENSY_DEV
    restart: unless-stopped
    command: tt-launch teensy simulate:=false

  teensy-sim:
    extends: ros-base
    container_name: tabletop-teensy-sim
    profiles: !override
      - sim
    restart: unless-stopped
    command: tt-launch teensy simulate:=true

  flic:
    container_name: tabletop-flic
    extends: ros-base
    profiles: !override
      - real
    depends_on:
      flicd:
        condition: service_healthy
        restart: true
        # condition: service_started
    restart: unless-stopped
    command: tt-launch flic simulate:=false

  flic-sim:
    container_name: tabletop-flic-sim
    extends: ros-base
    profiles: !override
      - sim
    restart: unless-stopped
    command: tt-launch flic simulate:=true

  eyelink:
    container_name: tabletop-eyelink
    extends: ros-base
    profiles: !override
      - real
    # restart: unless-stopped
    cap_add:
      - SYS_NICE # TODO: see if needed
    command: tt-launch eyelink simulate:=false

  eyelink-sim:
    container_name: tabletop-eyelink-sim
    extends: ros-base
    profiles: !override
      - sim
    restart: unless-stopped
    command: tt-launch eyelink simulate:=true

  commander:
    container_name: tabletop-commander
    extends: ros-base
    profiles: !override
      - commander
    runtime: $COMMANDER_RUNTIME
    volumes:
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
    environment:
      # - DISPLAY=$NOVNC_DISPLAY
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
    # depends_on:
    #   novnc:
    #     condition: service_healthy
    command: tt-launch commander

  dev:
    <<: *common
    container_name: tabletop-dev
    profiles: [ dev ]
    image: tabletop/dev
    build:
      context: .
      dockerfile: ./docker/ros/dev.Dockerfile
      pull: true
      additional_contexts:
        tabletop/ros-base: service:ros-base
    runtime: $COMMANDER_RUNTIME
    volumes:
      - /dev:/dev
      - type: bind
        source: .
        target: /tabletop
        consistency: $BIND_CONSISTENCY
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
      - python-venv:/tabletop/.venv
      - ~/.claude:/home/$USER_NAME/.claude
      - ~/.claude.json:/home/$USER_NAME/.claude.json
      - $KITTY_LISTEN_ON_MNT
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
      - KITTY_LISTEN_ON=$KITTY_LISTEN_ON_CONTAINER
    # depends_on:
    #   novnc:
    #     condition: service_healthy
    init: true
    privileged: true
    command: sleep infinity

volumes:
  python-venv:
