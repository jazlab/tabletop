name: tabletop

services:
  novnc:
    build:
      context: ./novnc
    ports:
      - 8080:8080
    networks:
      net:
        ipv4_address: 192.168.13.12
    restart: on-failure
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]  
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s
    environment:
      # Adjust to your screen size
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - RUN_XTERM=no
      - WINDOW_MANAGER=DWM

  robot:
    depends_on:
      novnc:
        condition: service_healthy
    restart: on-failure
    image: universalrobots/ursim_e-series
    platform: linux/amd64
    pid: host
    volumes:
      - ./ursim/urcaps:/urcaps
      - ./ursim/programs:/ursim/programs
      - ./ursim/entrypoint.sh:/entrypoint.sh
    networks:
      net:
        ipv4_address: 192.168.13.10
    hostname: robot
    environment:
      - DISPLAY=novnc:0.0

  server:
    depends_on:
      novnc:
        condition: service_healthy
    build:
      context: ./tabletop_server
    volumes:
      - ../..:/root/ws
    networks:
      net:
        ipv4_address: 192.168.13.11
    
    hostname: server
    environment:
      - DISPLAY=novnc:0.0
      - LAUNCH_FILE=${LAUNCH_FILE:-server_moveit_py.launch.py}
    command: >
      bash -c 
      "cd /root/ws
      && source /root/ws/src/tabletop/scripts/build.sh
      && ros2 launch tabletop_server $${LAUNCH_FILE}"

networks:
  net:
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.13.0/24
