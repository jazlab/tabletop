name: tabletop

x-common: &common
  ipc: host
  network_mode: host

services:
  autoheal:
    container_name: tabletop-autoheal
    image: willfarrell/autoheal:latest
    pull_policy: always
    network_mode: none
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal-tabletop
    restart: unless-stopped

  novnc:
    <<: *common
    container_name: tabletop-novnc
    image: tabletop/novnc
    build:
      context: ./docker/novnc
      pull: true
    labels:
      autoheal-tabletop: true
    environment:
      - PORT=8080
      - DISPLAY=:20.0
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - WINDOW_MANAGER=dwm
    depends_on:
      - autoheal
    restart: unless-stopped

  ursim:
    <<: *common
    container_name: tabletop-ursim
    # profiles: [sim]
    image: universalrobots/ursim_e-series:latest
    pull_policy: always
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - DISPLAY=:20.0
      - ROBOT_MODEL=ur5e
    depends_on:
      novnc:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    init: true
    entrypoint: [/entrypoint.sh]

  flicd:
    <<: *common
    container_name: tabletop-flicd
    image: ubuntu:latest
    pull_policy: always
    labels:
      autoheal-tabletop: true
    # privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./docker/flicd:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    depends_on: [autoheal]
    healthcheck:
      disable: true
      test: [CMD, /app/healthcheck.sh]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
      start_interval: 1s
    init: true
    command: /app/entrypoint.sh

  ros-base:
    <<: *common
    # profiles: [build]
    image: tabletop/ros-base
    build:
      context: .
      dockerfile: ./docker/ros/base.Dockerfile
      pull: true
      args:
        - ROS_DISTRO=jazzy
        - USER_NAME=$USER_NAME
        - USER_UID=$USER_UID
        - USER_GID=$USER_GID
        - USE_NVIDIA=$USE_NVIDIA
        - CUDA_VERSION=$CUDA_VERSION

  ros-build:
    <<: *common
    # profiles: [build]
    image: tabletop/ros-build
    build:
      context: .
      dockerfile: ./docker/ros/build.Dockerfile
      additional_contexts:
        base_image: service:ros-base
      pull: true
      args:
        - USER_UID=$USER_UID
        - USER_GID=$USER_GID
        - USE_NVIDIA=$USE_NVIDIA
        - CUDA_VERSION=$CUDA_VERSION
    volumes:
      # - /etc/localtime:/etc/localtime:ro
      - type: bind
        source: .
        target: /tabletop
        consistency: cached
      - python-venv:/tabletop/.venv
      - colcon-build:/tabletop/build
      - colcon-install:/tabletop/install
    init: true

  foxglove:
    extends: ros-build
    # profiles: !reset []
    container_name: tabletop-foxglove
    restart: unless-stopped
    command: tt-launch foxglove

  optitrack:
    extends: ros-build
    # profiles: !reset []
    container_name: tabletop-optitrack
    restart: unless-stopped
    command: tt-launch optitrack

  flir:
    extends: ros-build
    container_name: tabletop-flir
    # profiles: !reset []
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5
    restart: unless-stopped
    command: tt-launch flir

  teensy:
    extends: ros-build
    container_name: tabletop-teensy
    # profiles: !reset []
    devices:
      - $TEENSY_DEV
    restart: unless-stopped
    command: tt-launch teensy simulate:=false

  teensy-sim:
    extends: ros-build
    container_name: tabletop-teensy-sim
    # profiles: !override
    #   - sim
    restart: unless-stopped
    command: tt-launch teensy simulate:=true

  flic:
    container_name: tabletop-flic
    extends: ros-build
    # profiles: !reset []
    depends_on: [flicd]
    restart: unless-stopped
    command: tt-launch flic

  flic-sim:
    container_name: tabletop-flic-sim
    extends: ros-build
    # profiles: !override
    #   - sim
    restart: unless-stopped
    command: tt-launch flic simulate:=true

  commander:
    extends: ros-build
    container_name: tabletop-commander
    # profiles: [commander]
    runtime: $COMMANDER_RUNTIME
    volumes:
      - ${PULSE_SERVER_MNT:-/dev/null}
      - ${PULSE_COOKIE_MNT:-/dev/null}
    environment:
      - DISPLAY=:20.0
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
    depends_on:
      novnc:
        condition: service_healthy
    command: tt-launch commander

  dev:
    <<: *common
    container_name: tabletop-dev
    # profiles: [dev]
    image: tabletop/dev
    build:
      context: .
      dockerfile: ./docker/ros/dev.Dockerfile
      # pull: true
      additional_contexts:
        tabletop/ros-build: service:ros-build
    runtime: $COMMANDER_RUNTIME
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5
      - $TEENSY_DEV
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - type: bind
        source: .
        target: /tabletop
        consistency: cached
      - python-venv:/tabletop/.venv
      - colcon-build:/tabletop/build
      - colcon-install:/tabletop/install
      - ${PULSE_SERVER_MNT:-/dev/null}
      - ${PULSE_COOKIE_MNT:-/dev/null}
      - ~/.vimrc:/home/$USER_NAME/.vimrc
      - ~/.config/nvim:/home/$USER_NAME/.config/nvim
      - ~/.config/starship.toml:/home/$USER_NAME/.config/starship.toml
      - ${KITTY_LISTEN_ON_MNT:-/dev/null}
    environment:
      - DISPLAY=:20.0
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
      - KITTY_LISTEN_ON=$KITTY_LISTEN_ON_CONTAINER
    depends_on:
      novnc:
        condition: service_healthy
    init: true
    command: sleep infinity

volumes:
  python-venv:
  colcon-build:
  colcon-install:
