# Docker Compose service definitions for the TableTop rig.
#
# Services are grouped by Compose `profiles` and are normally brought up via
# `tt-compose --profile=<sim|ursim|real> up` (see README / docs/architecture.md
# section 2.3). Most ROS services `extends: ros-base` (shared image + repo bind
# mount) and differ only in their profile, devices, and `tt-launch` command.
# Profiles: real / sim / ursim (full sessions); commander, builder, dev
# (single-purpose, usually started indirectly by tt-launch/tt-build); template
# (the ros-base extends-only template, never run directly); deprecated (retired
# services kept for reference). .env (from tt-env-gen) supplies the $VARS below
# (device paths, GPU runtime, PulseAudio mounts).
name: tabletop

# Shared settings merged into most services: host IPC + networking so every
# ROS node sees every other node regardless of container (single DDS domain).
x-common: &common
  ipc: host
  network_mode: host

services:
  # Browser-accessible X11 desktop (noVNC at localhost:<NOVNC_PORT>/vnc.html) that hosts
  # all GUIs (RViz, UR sim teach pendant). Other GUI services share its DISPLAY.
  novnc:
    <<: *common
    container_name: tabletop-novnc
    profiles: [ real, sim, ursim ]
    image: jazlabtabletop/novnc
    environment:
      - PORT=$NOVNC_PORT
      - DISPLAY=$NOVNC_DISPLAY
      - DISPLAY_WIDTH=$NOVNC_WIDTH
      - DISPLAY_HEIGHT=$NOVNC_HEIGHT
      - WINDOW_MANAGER=dwm
    restart: unless-stopped

  # Universal Robots UR5e simulator (virtual controller + teach pendant GUI).
  # Renders to the noVNC display; loads our URCaps/programs from ur_robot/.
  ursim:
    <<: *common
    container_name: tabletop-ursim
    profiles: [ ursim ]
    image: universalrobots/ursim_e-series@sha256:bb2dd54b2c187af971e1fd2ac8a5752e88fb7f36cac0b0c375c90eb6262abee8
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROBOT_MODEL=ur5e
    depends_on:
      novnc:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    init: true
    entrypoint: [ /entrypoint.sh ]

  # DEPRECATED: Flic daemon (flicd) bridge over BLE. Superseded by the in-process
  # scapy BLE sniffer in the flic node; kept under the `deprecated` profile.
  flicd:
    <<: *common
    container_name: tabletop-flicd
    profiles: [ deprecated ]
    image: ubuntu@sha256:cd1dba651b3080c3686ecf4e3c4220f026b521fb76978881737d24f200828b2b
    volumes:
      - ./docker/flicd:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    healthcheck:
      disable: false
      test: [ CMD, /app/healthcheck.sh ]
      interval: 2s
      timeout: 1s
      start_period: 5s
      start_interval: 1s
      retries: 1
    cap_add:
      - NET_ADMIN
    init: true
    # stop_signal: SIGINT
    command: /app/entrypoint.sh

  # Base image + workspace bind mount that every ROS service extends. This is an
  # extends-only template (profile `template`); it is never run directly — the
  # `builder` service below performs builds, and each real service overrides the
  # command.
  ros-base:
    <<: *common
    image: jazlabtabletop/ros-base
    container_name: tabletop-ros-base
    profiles: [ template ]
    volumes:
      - type: bind
        source: .
        target: /tabletop
        consistency: $BIND_CONSISTENCY
      # - ./docker/ros/entrypoint.sh:/entrypoint.sh
      # - ./docker/ros/user-entrypoint.sh:/user-entrypoint.sh
      # - ./docker/ros/fix-uid-gid.sh:/fix-uid-gid.sh
    environment:
      - UV_EXTRA=$UV_EXTRA
      - HOST_UID=$HOST_UID
      - HOST_GID=$HOST_GID
    user: root
    stop_signal: SIGINT
    working_dir: /tabletop

  # General-purpose build container used by the host tt-build wrapper. Privileged
  # with /dev mounted and the platformio-core cache so the same service can build
  # the colcon workspace, package the Foxglove plugin, AND build/flash the
  # Teensy/Flic firmware. The build component is supplied at run time via
  # `tt-compose run --rm builder tt-build <component>`.
  builder:
    extends: ros-base
    container_name: tabletop-builder
    profiles: !override [ builder ]
    volumes:
      - /dev:/dev
      - platformio-core:/platformio
    privileged: true

  # Foxglove bridge: exposes a WebSocket (ws://localhost:8765) for the Foxglove app.
  foxglove:
    extends: ros-base
    container_name: tabletop-foxglove
    profiles: !override [ real, sim ]
    restart: unless-stopped
    command: tt-launch foxglove

  # RViz visualization, rendered to the noVNC display.
  rviz:
    extends: ros-base
    container_name: tabletop-rviz
    profiles: !override [ real, sim ]
    environment:
      - DISPLAY=$NOVNC_DISPLAY
    depends_on:
      novnc:
        condition: service_healthy
    restart: unless-stopped
    command: tt-launch rviz

  # Real dual-arm UR5e driver stack. SYS_NICE + rtprio/memlock ulimits for the
  # driver's real-time control thread.
  ur:
    extends: ros-base
    container_name: tabletop-ur
    profiles: !override [ real ]
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      memlock: -1
    restart: unless-stopped
    command: tt-launch dual_ur robot_mode:=real

  # Mock dual-arm UR5e driver (no hardware) for simulation; same RT ulimits.
  ur-mock:
    extends: ros-base
    container_name: tabletop-ur-mock
    profiles: !override [ sim ]
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      memlock: -1
    restart: unless-stopped
    command: tt-launch dual_ur robot_mode:=mock

  # OptiTrack motion-capture driver (real hardware only).
  optitrack:
    extends: ros-base
    container_name: tabletop-optitrack
    profiles: !override [ real ]
    restart: unless-stopped
    command: tt-launch optitrack

  # DEPRECATED: unsynchronized FLIR camera driver (one device per $FLIR_DEV_*).
  # Superseded by the hardware-synchronized `flir` service below.
  flir-no-sync:
    extends: ros-base
    container_name: tabletop-flir-no-sync
    profiles: !override [ deprecated ]
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5
    restart: unless-stopped
    command: tt-launch flir_no_sync

  # Hardware-synchronized FLIR camera driver (Teensy trigger pulse). One USB
  # device per $FLIR_DEV_* (up to FLIR_MAX_DEVS).
  flir:
    extends: ros-base
    container_name: tabletop-flir
    profiles: !override [ real ]
    devices:
      - $FLIR_DEV_0
      - $FLIR_DEV_1
      - $FLIR_DEV_2
      - $FLIR_DEV_3
      - $FLIR_DEV_4
      - $FLIR_DEV_5
    # volumes:
    #   - /dev:/dev
    # privileged: true
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
    #   - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
    # cpus: 8 # Limit cpu usage
    # runtime: $COMMANDER_RUNTIME
    restart: unless-stopped
    command: tt-launch flir_synchronized

  # Real Teensy micro-ROS agent (arm locks, safety laser, reward, sync pulse).
  # Needs the $TEENSY_DEV serial device.
  teensy:
    extends: ros-base
    container_name: tabletop-teensy
    profiles: !override [ real ]
    devices:
      - $TEENSY_DEV
    restart: unless-stopped
    command: tt-launch teensy simulate:=false micro_ros_device:=$TEENSY_DEV

  # Mock Teensy node (simulates firmware topics/services), no serial device.
  teensy-sim:
    extends: ros-base
    container_name: tabletop-teensy-sim
    profiles: !override [ sim ]
    restart: unless-stopped
    command: tt-launch teensy simulate:=true

  # Real Flic button node. NET_ADMIN for raw BLE packet capture (scapy sniffer).
  flic:
    extends: ros-base
    container_name: tabletop-flic
    profiles: !override [ real ]
    cap_add:
      - NET_ADMIN
    # flicd no longer needed after scapy implementation
    # depends_on:
    #   flicd:
    #     condition: service_healthy
    #     # condition: service_started
    #     restart: true
    restart: unless-stopped
    command: tt-launch flic simulate:=false

  # Mock Flic button node (simulated presses), still needs NET_ADMIN.
  flic-sim:
    extends: ros-base
    container_name: tabletop-flic-sim
    profiles: !override [ sim ]
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    command: tt-launch flic simulate:=true

  # Real EyeLink eye-tracker node. rtprio ulimit for sample timing; bags mount
  # for recording eye samples.
  eyelink:
    extends: ros-base
    container_name: tabletop-eyelink
    profiles: !override [ real ]
    cap_add:
      - SYS_NICE # TODO: see if needed
    ulimits:
      rtprio: 99
    volumes:
      - $ROS_BAG_DIR_MNT
    environment:
      - ROS_BAG_DIR=$ROS_BAG_DIR_CONTAINER
    restart: unless-stopped
    command: tt-launch eyelink simulate:=false

  # Mock EyeLink node (simulated samples), no hardware.
  eyelink-sim:
    extends: ros-base
    container_name: tabletop-eyelink-sim
    profiles: !override [ sim ]
    restart: unless-stopped
    command: tt-launch eyelink simulate:=true

  # The orchestrator: runs the Commander node (in-process MoveIt). GPU runtime
  # if available, PulseAudio sockets for reward sounds, bags mount. Longer
  # stop grace period for clean shutdown. Usually launched on top of a session.
  commander:
    extends: ros-base
    container_name: tabletop-commander
    profiles: !override [ commander ]
    runtime: $COMMANDER_RUNTIME
    volumes:
      - $ROS_BAG_DIR_MNT
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROS_BAG_DIR=$ROS_BAG_DIR_CONTAINER
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
      - PULSE_COOKIE=$PULSE_COOKIE_CONTAINER
    stop_grace_period: 40s
    command: tt-launch commander

  # The VS Code Dev Container: everything mounted, idles on `sleep infinity`
  # so you attach and run tt-build / tt-launch interactively.
  dev:
    extends: ros-base
    container_name: tabletop-dev
    profiles: !override [ dev ]
    runtime: $COMMANDER_RUNTIME
    volumes:
      - platformio-core:/platformio
      - $ROS_BAG_DIR_MNT
      - $PULSE_SERVER_MNT
      - $PULSE_COOKIE_MNT
    environment:
      - DISPLAY=$NOVNC_DISPLAY
      - ROS_BAG_DIR=$ROS_BAG_DIR_CONTAINER
      - NVIDIA_VISIBLE_DEVICES=$NVIDIA_VISIBLE_DEVICES
      - NVIDIA_DRIVER_CAPABILITIES=$NVIDIA_DRIVER_CAPABILITIES
      - PULSE_SERVER=$PULSE_SERVER_CONTAINER
      - PULSE_COOKIE=$PULSE_COOKIE_CONTAINER
    init: true
    entrypoint: ""
    command: sleep infinity

# Named volume caching PlatformIO's core (toolchains/frameworks) across builds.
volumes:
  platformio-core:
