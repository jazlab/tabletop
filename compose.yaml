name: tabletop

services:
  robot:
    image: universalrobots/ursim_e-series
    volumes:
      - ./ursim/urcaps:/urcaps
      - ./ursim/programs:/ursim/programs
    pid: host
    networks:
      tabletop_net:
        ipv4_address: 192.168.13.10
    # ports:
    #   - 6080:6080
    #   - 5900:5900
    hostname: robot
    # docker run --rm -it -v ./ursim/urcaps:/urcaps -v ./ursim/programs:/ursim/program --ip 192.168.13.10 -h robot --network tabletop_net universalrobots/ursim_e-series
  server:
    build:
      context: .
      dockerfile: ./server.Dockerfile
    tty: true
    stdin_open: true
    volumes:
      - /home/valmiki/ws/:/root/ws/
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/dri:/dev/dri
    develop:
      watch:
        - path: ./
          action: sync+restart
          target: /root/ws/src/tabletop/
    pid: host
    networks:
      tabletop_net:
        ipv4_address: 192.168.13.11
    hostname: server
    environment:
      # - DISPLAY=$(echo $DISPLAY | sed 's/^[^:]*\(.*\)/172.17.0.1\1/')
      # - DISPLAY=host.docker.internal:0
      - DISPLAY=$DISPLAY
    # command: bash
    command: >
      bash -c 
      "source /root/ws/src/tabletop/scripts/build.sh
      && ros2 launch tabletop_server tabletop_server.launch.py"

    # && ros2 launch ur_calibration calibration_correction.launch.py \
    # robot_ip:=192.168.13.10 target_filename:=/root/ws/src/tabletop/tabletop_server/config/server_params.yaml
      
networks:
  tabletop_net:
    driver: bridge
    external: true
    ipam:
      config:
        - subnet: 192.168.13.0/24
