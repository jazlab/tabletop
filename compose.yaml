name: tabletop

services:
  novnc:
    build:
      context: ./novnc
    ports:
      - 8080:8080
    networks:
      net:
        ipv4_address: 192.168.13.12
    restart: on-failure
    environment:
      # Adjust to your screen size
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - RUN_XTERM=no
      - WINDOW_MANAGER=DWM

  robot:
    depends_on:
      - novnc
    restart: on-failure
    image: universalrobots/ursim_e-series
    platform: linux/amd64
    volumes:
      - ./ursim/urcaps:/urcaps
      - ./ursim/programs:/ursim/programs
    pid: host
    networks:
      net:
        ipv4_address: 192.168.13.10
    hostname: robot
    environment:
      - DISPLAY=novnc:0.0

  server:
    depends_on:
      - novnc
    build:
      context: ./tabletop_server
    volumes:
      - $HOME/ws/src/tabletop:/root/ws/src/tabletop
    networks:
      net:
        ipv4_address: 192.168.13.11
    
    hostname: server
    environment:
      - DISPLAY=novnc:0.0
    command: >
      bash -c 
      "source /root/ws/src/tabletop/scripts/build.sh
      && ros2 launch tabletop_server moveit.launch.py"

networks:
  net:
    attachable: true
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.13.0/24
