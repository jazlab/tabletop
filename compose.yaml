name: tabletop

services:
  novnc:
    build:
      context: ./docker/novnc
      pull: true
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.100
    hostname: novnc
    restart: on-failure
    healthcheck:
      test: [ "CMD", "/app/healthcheck.sh" ]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 2s
    ports:
      - 8080:8080
    environment:
      - DISPLAY_WIDTH=${DISPLAY_WIDTH:-1280}
      - DISPLAY_HEIGHT=${DISPLAY_HEIGHT:-824}
      - RUN_XTERM=no
      - WINDOW_MANAGER=DWM

  ursim:
    image: universalrobots/ursim_e-series:latest
    pull_policy: always
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.20
    hostname: ursim
    restart: unless-stopped
    depends_on:
      novnc:
        condition: service_healthy
    volumes:
      - ./ur_robot/urcaps:/urcaps
      - ./ur_robot/programs:/ursim/programs
      - ./docker/ursim/entrypoint.sh:/entrypoint.sh
    environment:
      - ROBOT_MODEL=ur5e
      - DISPLAY=novnc:0.0
    init: true
    entrypoint: [ "/entrypoint.sh" ]

  server-base:
    build:
      context: .
      dockerfile: ./docker/server/Dockerfile
      target: base
      pull: true
      args:
        - ROS_DISTRO=jazzy
        - USER=mules
        - UID=1000 # Enter your user id here

  server:
    extends: server-base
    runtime: nvidia
    networks:
      tabletop_net:
        ipv4_address: 192.168.12.10
    hostname: server
    volumes:
      - ./:/tabletop
      - /tmp/.X11-unix:/tmp/.X11-unix
    working_dir: /tabletop
    ports:
      - 50001:50001
      - 50002:50002
      - 50003:50003
      - 50004:50004
    environment:
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=$DISPLAY
    # Uncomment the following section if a teensy is connected
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    # Uncomment the following section if you plan on connecting a teensy after starting the container
    # device_cgroup_rules:
    #   - c 161:* rmw
    # Uncomment the following section if you plan on uploading code to the teensy from the dev container
    init: true
    command: sleep infinity

  server-dev:
    extends: server
    build:
      target: dev
    # Uncomment the following section if you plan on uploading code to the teensy from the dev container
    privileged: true
    volumes:
      - /dev:/dev
      - ~/.vimrc:/home/mules/.vimrc:ro
      - ~/.config/starship.toml:/home/mules/.config/starship.toml:ro
    environment:
      - SHELL=/bin/bash

  optitrack:
    extends: server-base
    network_mode: host
    volumes:
      - ./:/tabletop
    working_dir: /tabletop
    init: true
    command: bash -c "source /tabletop/install/setup.bash && ros2 launch mocap4r2_optitrack_driver optitrack2.launch.py"

  flic:
    image: ubuntu:latest
    pull_policy: always
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./docker/flic:/app
    environment:
      - HCI_DEV=hci0
      - BD_ADDR=c8:c6:ac:df:da:c2
      - PORT=5551
      - SERVER_ADDR=0.0.0.0
    init: true
    command: /app/entrypoint.sh
    # command: bash -c
    #   "/app/flicd
    #   --db-file /app/flic.db
    #   --my-bdaddr $$BD_ADDR
    #   --server-addr $$SERVER_ADDR
    #   --server-port $$PORT
    #   --hci-dev $$HCI_DEV
    #   --wait-for-hci"

networks:
  tabletop_net:
    name: tabletop_net
    attachable: true
    driver: bridge
    # driver_opts:
    #   com.docker.network.bridge.gateway_mode_ipv4: routed
    ipam:
      config:
        - subnet: 192.168.12.0/24
