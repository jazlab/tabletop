[project]
name = "tabletop-py"
version = "0.1.0"
description = "ROS-independent Python utilities for the TableTop project"
readme = "README.md"
authors = [{ name = "Valmiki Kothare", email = "valmiki.kothare.vk@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "debugpy>=1.8.16",
    "matplotlib>=3.10.5",
    "mingus>=0.6.1",
    "pandas>=2.3.1",
    "pre-commit>=4.3.0",
    "pyglet<2",
    "ros2-graph>=0.0.5",
    "scikit-learn>=1.7.1",
    "sr-research-pylink>=2.1.1145.post1",
    "torch>=2.8.0",
    "tqdm>=4.67.1",
    "trimesh[easy]>=4.7.4",
]

[project.scripts]
train-gaze-estimation = "tabletop_py.eyelink.train_gaze_estimation:main"

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
torchvision = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[build-system]
requires = ["uv_build>=0.8.11,<0.9.0"]
build-backend = "uv_build"
