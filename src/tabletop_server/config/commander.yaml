/commander:
  ros__parameters:
    simulate: true
    max_workers: 8

    dashboard:
      installation: default.installation
      program: external_control.urp
      play_retries: 3
      play_retry_delay: 1.0

    teensy:
      safe_to_execute:
        required_time: 2.0
        max_sensor_delay: 0.1
      spin_period: 0.05

    flic:
      bd_addrs:
        small_object_0: 90:88:a9:50:5f:b6
        small_object_1: 90:88:a9:50:5f:db
