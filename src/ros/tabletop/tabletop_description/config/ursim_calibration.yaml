# Kinematic calibration parameters for the UR Simulator (URSim).
# Unlike the real-robot calibration files, these values are the ideal nominal DH parameters
# with zero manufacturing-tolerance corrections — URSim uses exact geometry.
# Machine-generated by the UR `calibration_correction` tool run against a URSim instance.
# DO NOT edit by hand.
#
# Consumed by:
#   - tabletop_rig/launch/ur.launch.py            (selected when robot_mode:=ursim)
