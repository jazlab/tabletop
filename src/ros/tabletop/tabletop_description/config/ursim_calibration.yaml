#   - tabletop_description/launch/rsp.launch.py   (forwarded as kinematics_params: to xacro)
#
# Structure:
#   kinematics.<link>: Pose correction delta (x/y/z in meters, roll/pitch/yaw in radians).
#                      Near-zero offsets reflect the simulator's ideal geometry.
