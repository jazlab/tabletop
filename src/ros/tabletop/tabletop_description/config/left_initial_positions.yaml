# Initial joint positions for the LEFT arm of the dual-arm UR5e rig (mock hardware).
# Loaded by tabletop_description/urdf/dual_tabletop.urdf.xacro (via xacro.load_yaml) and passed to
# dual_rsp.launch.py as the left_initial_positions_file argument.
# All values are in RADIANS (REP-103).
shoulder_pan_joint: 0.0     # Rotation about the base vertical axis; 0 = arm pointing forward
shoulder_lift_joint: -1.5707 # Shoulder pitch; -pi/2 = arm horizontal
elbow_joint: 1.5707          # Elbow bend;     +pi/2 = elbow flexed upward
wrist_1_joint: -1.5707       # Wrist pitch;    -pi/2
wrist_2_joint: 1.5707        # Wrist yaw;      +pi/2
wrist_3_joint: 0.0           # Tool rotation;  0 = no rotation
