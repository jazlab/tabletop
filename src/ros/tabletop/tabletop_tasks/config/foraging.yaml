tasks:
  - class: ForagingTask
    kwargs:
      trial_generator:
        class: BlockedCupDrawer
        kwargs:
          poses:
            - position: [-0.2, -0.5, 0.9]
              rpy: [0.4, -0.1, -1.5707]
            - position: [0.2, -0.5, 0.9]
              rpy: [-0.4, 0.1, -1.5707]
          correct_trials_per_block: 10
      fixation_duration: 0.5
      stimulus_duration: 0.5
      delay_duration: 0.5
      response_timeout: 5.0
      reward_duration: 0.1
      reveal_duration: 0.5
      play_sound: true
      sound_kwargs:
        duration: 0.5
