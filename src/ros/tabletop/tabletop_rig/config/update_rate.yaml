# ros2_control controller_manager update rate configuration.
#
# Consumed by: tabletop_rig/launch/multi_ur.launch.py  (and transitively
#   ur_control.launch.py / dual_ur.launch.py) as the
#   update_rate_config_file argument, passed directly to the
#   ros2_control_node (controller_manager package).
#
# update_rate controls how often (Hz) the controller_manager runs its
# control loop — i.e., how often hardware interfaces are read/written and
# controllers are updated.  Higher values reduce latency but increase CPU
# load.  The UR5e driver supports up to 500 Hz over the real-time interface.

/**/controller_manager:
  ros__parameters:
    update_rate: 500 # Control-loop frequency (Hz); 500 Hz matches the UR real-time data rate
