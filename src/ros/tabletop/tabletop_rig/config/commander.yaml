        small_object_28: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_29: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        smooth_pursuit_object: null

    left_manipulation_interface:
      group_name: left_manipulator
      planning:
        default_pose_link: left_eef
      trajectory_cache:
        kwargs:
          path: $TABLETOP_CACHE_DIR/left_trajectory_cache
      execution:
        joint_trajectory_controller: left_scaled_joint_trajectory_controller
      test_object_attached:
        joint_name: left_eblow_joint
      attach_link: left_eef
      touch_links:
        - left_eef_link
        - left_eef_sphere
      allowed_mount_collisions:
        left_eef_sphere: rig
      reachable_grid_indices:
        - 0,0
        - 0,1
        - 0,2
        - 1,0
        - 1,1
        - 1,2
        - 2,0
        - 2,1
        - 2,2
        - 3,0
        - 3,1
        - 3,2
        - 4,0
        - 4,1
        - 4,2

