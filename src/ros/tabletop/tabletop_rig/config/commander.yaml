        small_object_25: 90:88:a9:50:7c:ba
        small_object_26: 90:88:a9:50:75:07
        small_object_27: 90:88:a9:50:65:fb
        small_object_28: 90:88:a9:50:66:09
        small_object_29: 90:88:a9:50:5f:68

    robot_interface_names:
      left_manipulator:
        ur_interface_name: left_ur_interface
        manipulation_interface_name: left_manipulation_interface
        manipulation_context_interface_name: left_manipulation_context_interface
      right_manipulator:
        ur_interface_name: right_ur_interface
        manipulation_interface_name: right_manipulation_interface
        manipulation_context_interface_name: right_manipulation_context_interface

    # Interface parameters

    sound_interface:
      enable: true
      soundfont_path: $(find-pkg-share tabletop_rig)/soundfonts/moog.sf2
      instrument: 62
      default_note:
        name: C
        octave: 6
        velocity: 127
        channel: 0
      default_duration: 0.5

    teensy_interface:
      safe_to_execute:
        required_time: 2.0
        max_sensor_delay: 0.1
      spin_period: 0.05
      sensor_delay_warn_threshold: 0.01

    common_ur_interface:
      installation: default.installation
      program: external_control.urp
      reset:
        max_attempts: 5
        num_attempts_before_safety_restart: null
        safety_restart_timeout: 10

    left_ur_interface:
      namespace: left

    right_ur_interface:
      namespace: right

    common_manipulation_interface:
      planning:
        fast_pipeline: linear
        fallback_pipeline: rrt_star
        # fallback_pipeline: rrtc_star
      trajectory_cache:
        use_cached_trajectories: true
        freeze_cache: false
        kwargs:
          position_tolerance: 0.03 # meters
          orientation_tolerance: 0.01 # radians
          robot_state_tolerance: 0.02 # radians
          max_trajectories: 5
          new_cache: false
      execution:
        robot_state_move_tolerance: 0.02 # radians
      test_object_attached:
        enable: false
        topic: /joint_states
        object_id: test_object
        num_samples: 2500
        effort_threshold: -1.615
        greater_than: false
      detach_velocity_scaling_factor: 1.0
      skip_idle_on_return: true
      mount_collision_ids:
        - rig
      manipulation_state_goals:
        idle:
          type: named_target_state
          value: idle
        pre_fetch:
          type: offset
          value: [ -0.05, 0.0, -0.05 ] # relative to object init pose
        pre_attach:
          type: offset
          value: [ -0.05, 0.0, 0.0 ] # relative to object init pose
        attach:
          type: offset
          value: [ 0.0, 0.0, 0.0 ] # relative to object init pose
        post_attach:
          type: offset
          value: [ 0.077, 0.0, 0.0 ] # relative to object init pose
        post_fetch:
          type: offset
          value: [ 0.077, 0.0, -0.15 ] # relative to object init pose
        fetched:
          type: named_target_state
          value: fetched
        present:
          # type: named_target_state
          # value: present
          type: pose_stamped
          value:
            position: [ 0.9525, 0.4, 0.6 ]
            rpy: [ 0.0, 0.0, -1.5707 ]
        object_overrides:
          # be careful about doing this, make sure
          smooth_pursuit_object:
            post_attach:
              type: offset
              value: [ 0.12, 0.0, 0.0 ]
            post_fetch:
              type: offset
              value: [ 0.12, 0.0, -0.15 ]

      manually_attach:
        mesh_dir: $(find-pkg-share tabletop_rig)/meshes/objects
        collision_object_kwargs:
          # allowed_collision_ids:
          #   - eef_sphere
          simplification: bounding_primitive
          color: [ 1.0, 1.0, 1.0, 0.5 ]
      reset_config_map:
        small_object_0: null
        small_object_1: null
        small_object_2: null
        small_object_3: null
        small_object_4: null
        small_object_5: null
        small_object_6: null
        small_object_7: null
        small_object_8: null
        small_object_9: null
        small_object_10: null
        small_object_11: null
        small_object_12: null
        small_object_13: null
        small_object_14: null
        small_object_15: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_16: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_17: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_18: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_19: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_20: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_21: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_22: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_23: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
        small_object_24: $(find-pkg-share tabletop_rig)/config/object_reset/drawer.yaml
