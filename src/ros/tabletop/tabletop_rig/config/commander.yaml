/commander:
  ros__parameters:
    # Commander parameters

    simulate: true

    smooth_pursuit:
      reward_duration: 0.1
      reward_interval: 1.0
      # minimum ratio of smoothly pursuing feedback messages to total messages
      # to activate the reward
      reward_threshold_ratio: 0.8

    flic:
      bd_addrs:
        small_object_0: 90:88:a9:50:5f:b6
        small_object_1: 90:88:a9:50:5f:db
