controller_manager:
  ros__parameters:
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_io_and_status_controller:
      type: ur_controllers/GPIOController

    left_speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    left_force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    left_forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    left_forward_effort_controller:
      type: effort_controllers/JointGroupEffortController

    left_forward_position_controller:
      type: position_controllers/JointGroupPositionController

    left_force_mode_controller:
      type: ur_controllers/ForceModeController

    left_freedrive_mode_controller:
      type: ur_controllers/FreedriveModeController

    left_passthrough_trajectory_controller:
      type: ur_controllers/PassthroughTrajectoryController

    left_tcp_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster

    left_ur_configuration_controller:
      type: ur_controllers/URConfigurationController

    left_tool_contact_controller:
      type: ur_controllers/ToolContactController

    right_io_and_status_controller:
      type: ur_controllers/GPIOController

    right_speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    right_force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    right_forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    right_forward_effort_controller:
      type: effort_controllers/JointGroupEffortController

    right_forward_position_controller:
      type: position_controllers/JointGroupPositionController

    right_force_mode_controller:
      type: ur_controllers/ForceModeController

    right_freedrive_mode_controller:
      type: ur_controllers/FreedriveModeController

    right_passthrough_trajectory_controller:
      type: ur_controllers/PassthroughTrajectoryController

    right_tcp_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster

    right_ur_configuration_controller:
      type: ur_controllers/URConfigurationController

    right_tool_contact_controller:
      type: ur_controllers/ToolContactController

    # The way this is currently implemented upstream doesn't really work for us. When using
    # position control, the robot will have a tracking error. However, limits will be enforced
    # from the currently reported position, effectively limiting the possible step size using the
    # joints' velocity limits. Until this is resolved, we will keep command limits non-enforced.
    # Note: On Jazzy this is the default behavior, anyway. For Rolling / Kilted this defaults to
    # true.
    enforce_command_limits: false

# ==================== LEFT ARM CONTROLLERS ====================

left_speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0
    tf_prefix: "$(var left_tf_prefix)"

left_io_and_status_controller:
  ros__parameters:
    tf_prefix: "$(var left_tf_prefix)"

left_ur_configuration_controller:
  ros__parameters:
    tf_prefix: "$(var left_tf_prefix)"

left_force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: $(var left_tf_prefix)tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: $(var left_tf_prefix)tool0_controller
    topic_name: left_ft_data

left_joint_trajectory_controller:
  ros__parameters:
    joints:
      - $(var left_tf_prefix)shoulder_pan_joint
      - $(var left_tf_prefix)shoulder_lift_joint
      - $(var left_tf_prefix)elbow_joint
      - $(var left_tf_prefix)wrist_1_joint
      - $(var left_tf_prefix)wrist_2_joint
      - $(var left_tf_prefix)wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.02
      goal_time: 0.0
      $(var left_tf_prefix)shoulder_pan_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)shoulder_lift_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)elbow_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)wrist_1_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)wrist_2_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)wrist_3_joint: { trajectory: 0.2, goal: 0.005 }

left_scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - $(var left_tf_prefix)shoulder_pan_joint
      - $(var left_tf_prefix)shoulder_lift_joint
      - $(var left_tf_prefix)elbow_joint
      - $(var left_tf_prefix)wrist_1_joint
      - $(var left_tf_prefix)wrist_2_joint
      - $(var left_tf_prefix)wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.02
      goal_time: 0.0
      $(var left_tf_prefix)shoulder_pan_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)shoulder_lift_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)elbow_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)wrist_1_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)wrist_2_joint: { trajectory: 0.2, goal: 0.005 }
      $(var left_tf_prefix)wrist_3_joint: { trajectory: 0.2, goal: 0.005 }
    speed_scaling_interface_name: $(var left_tf_prefix)speed_scaling/speed_scaling_factor

left_passthrough_trajectory_controller:
  ros__parameters:
    tf_prefix: "$(var left_tf_prefix)"
    joints:
      - $(var left_tf_prefix)shoulder_pan_joint
      - $(var left_tf_prefix)shoulder_lift_joint
      - $(var left_tf_prefix)elbow_joint
      - $(var left_tf_prefix)wrist_1_joint
      - $(var left_tf_prefix)wrist_2_joint
      - $(var left_tf_prefix)wrist_3_joint
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: $(var left_tf_prefix)speed_scaling/speed_scaling_factor

left_forward_velocity_controller:
  ros__parameters:
    joints:
      - $(var left_tf_prefix)shoulder_pan_joint
      - $(var left_tf_prefix)shoulder_lift_joint
      - $(var left_tf_prefix)elbow_joint
      - $(var left_tf_prefix)wrist_1_joint
      - $(var left_tf_prefix)wrist_2_joint
      - $(var left_tf_prefix)wrist_3_joint
    interface_name: velocity

left_forward_effort_controller:
  ros__parameters:
    joints:
      - $(var left_tf_prefix)shoulder_pan_joint
      - $(var left_tf_prefix)shoulder_lift_joint
      - $(var left_tf_prefix)elbow_joint
      - $(var left_tf_prefix)wrist_1_joint
      - $(var left_tf_prefix)wrist_2_joint
      - $(var left_tf_prefix)wrist_3_joint
    interface_name: effort

left_forward_position_controller:
  ros__parameters:
    joints:
      - $(var left_tf_prefix)shoulder_pan_joint
      - $(var left_tf_prefix)shoulder_lift_joint
      - $(var left_tf_prefix)elbow_joint
      - $(var left_tf_prefix)wrist_1_joint
      - $(var left_tf_prefix)wrist_2_joint
      - $(var left_tf_prefix)wrist_3_joint

left_force_mode_controller:
  ros__parameters:
    tf_prefix: "$(var left_tf_prefix)"

left_freedrive_mode_controller:
  ros__parameters:
    tf_prefix: "$(var left_tf_prefix)"

left_tcp_pose_broadcaster:
  ros__parameters:
    frame_id: $(var left_tf_prefix)base
    pose_name: $(var left_tf_prefix)tcp_pose
    tf:
      child_frame_id: $(var left_tf_prefix)tool0_controller

left_tool_contact_controller:
  ros__parameters:
    tf_prefix: "$(var left_tf_prefix)"

