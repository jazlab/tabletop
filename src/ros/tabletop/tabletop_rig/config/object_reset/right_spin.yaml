!ObjectResetConfig
start_goal:
  - !Constraints
    pose_goal:
      link_name: right_eef
      pose_stamped: !PoseStamped
        position: [-0.15, 0.0, 0.074]
        rpy: [1.5707, 2.5307, 1.5707]
        frame_id: right_reset_station/spike
    joint_constraints:
      - joint_name: right_wrist_3_joint
        position: -3.1415
        tolerance_above: 3.1415
        tolerance_below: 3.1415

reset_request: !ConcatPlanRequest
  goals:
    # Move forward into drawer station
    - !PoseStamped
      position: [-0.075, 0.0, 0.074]
      rpy: [1.5707, 2.5307, 1.5707]
      frame_id: right_reset_station/spike

    # 360 spin CW (must use ptp planner)
    # - !JointStateDeltaDict
    #   right_wrist_3_joint: 6.2831

    # 360 spin CW in 90 deg steps
    # The steps are necessary for the linear planner because the linear
    # planner simply converts joint state goals into a pose goal for the
    # end effector link, and a 360 rotation about any joint results in
    # the same end effector pose, so we do it in steps
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707

    # Retract to start position
    - !PoseStamped
      position: [-0.15, 0.0, 0.074]
      rpy: [1.5707, 2.5307, 1.5707]
      frame_id: right_reset_station/spike
  planning_pipeline: linear
object_allowed_collision_ids:
  - right_reset_station
additional_allowed_collisions:
  - [right_eef_sphere, right_reset_station]
