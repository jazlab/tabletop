# Object reset configuration — RIGHT arm, SPIN strategy.
#
# Consumed by: ObjectManipulationInterface._init_reset_configs()
#   in tabletop_rig/interfaces/moveit/object_manipulation.py, via the
#   reset_config_map ROS parameter that maps grid object IDs to these files.
#   Called at runtime by reset_object() / _reset_object_impl().
#
# Mirror of left_spin.yaml for the right arm.  The right reset station
# spike frame origin is on the opposite side, so X coordinates are negated.
# The approach yaw is +π/2 (+1.5707) instead of left's -π/2 (-1.5707)
# because the right EEF faces the opposite direction.
#
# Motion sequence (poses in the right_reset_station/spike TF frame):
#   1. start_goal — constrained approach pose with wrist_3 in [-2π, 0] (≤ 0),
#      leaving room for the subsequent +2π (360° CW) spin within the joint limit.
#   2. goals[0]   — push onto spike: advance to [-0.075, 0, 0.074].
#   3. goals[1–4] — 360° CW spin in four 90° (π/2 rad) wrist_3 delta steps.
#   4. goals[5]   — retract to approach position [-0.15, 0, 0.074].
#
# All positions are [x, y, z] in meters (REP-103); rpy is [roll, pitch, yaw]
# in radians (REP-103); joint deltas are in radians (REP-103).

!ObjectResetConfig
start_goal:
  - !Constraints # Approach pose with a joint constraint to set wrist_3 starting angle
    pose_goal:
      link_name: right_eef # End-effector link that must satisfy the Cartesian goal
      pose_stamped: !PoseStamped
        position: [-0.15, 0.0, 0.074] # Approach (retracted) pose, 150 mm from spike along -X (meters)
        rpy: [1.5707, 2.5307, 1.5707] # EEF orientation for spike approach (radians; ~90°/145°/+90°)
        frame_id: right_reset_station/spike # TF frame: the right reset station spike/spindle
    joint_constraints:
      - joint_name: right_wrist_3_joint # Constrain wrist_3 to [-2π, 0] so a full +2π spin stays within the joint limit
        position: -3.1415 # Center of the allowed wrist_3 range: -π rad (radians, REP-103)
        tolerance_above: 3.1415 # +π → upper bound 0; wrist_3 must be ≤ 0 (radians)
        tolerance_below: 3.1415 # -π → lower bound -2π; wrist_3 must be ≥ -2π (radians)

reset_request: !ConcatPlanRequest
  goals:
    # Move forward into drawer station
    - !PoseStamped
      position: [-0.075, 0.0, 0.074] # Insert pose — advance 75 mm onto spike along -X (meters)
      rpy: [1.5707, 2.5307, 1.5707] # Same orientation as approach (radians)
      frame_id: right_reset_station/spike

    # 360 spin CW (must use ptp planner)
    # - !JointStateDeltaDict
    #   right_wrist_3_joint: 6.2831

    # 360 spin CW in 90 deg steps
    # The steps are necessary for the linear planner because the linear
    # planner simply converts joint state goals into a pose goal for the
    # end effector link, and a 360 rotation about any joint results in
    # the same end effector pose, so we do it in steps
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707 # Step 1 of 4: rotate wrist_3 +90° CW (π/2 rad, REP-103)
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707 # Step 2 of 4: rotate wrist_3 +90° CW (π/2 rad, REP-103)
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707 # Step 3 of 4: rotate wrist_3 +90° CW (π/2 rad, REP-103)
    - !JointStateDeltaDict
      right_wrist_3_joint: 1.5707 # Step 4 of 4: rotate wrist_3 +90° CW (π/2 rad, REP-103); completes 360°

    # Retract to start position
    - !PoseStamped
      position: [-0.15, 0.0, 0.074] # Retract to approach pose — 150 mm from spike (meters)
      rpy: [1.5707, 2.5307, 1.5707] # Same orientation as approach (radians)
      frame_id: right_reset_station/spike
  planning_pipeline: linear # Must be "linear" or "ptp" when collision allowances are active
object_allowed_collision_ids:
  - right_reset_station # Allow collision between the manipulated object and the reset station body during spin
additional_allowed_collisions:
  - [right_eef_sphere, right_reset_station] # Allow EEF collision sphere to contact reset station during insert/spin
