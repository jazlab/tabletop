# Object reset configuration — RIGHT arm, DRAWER strategy.
#
# Consumed by: ObjectManipulationInterface._init_reset_configs()
#   in tabletop_rig/interfaces/moveit/object_manipulation.py, via the
#   reset_config_map ROS parameter that maps grid object IDs to these files.
#   Called at runtime by reset_object() / _reset_object_impl() to return a
#   manipulated object to the right reset station drawer.
#
# Mirror of left_drawer.yaml for the right arm.  The right reset station
# frame origin is on the opposite side, so X coordinates are negated
# relative to left_drawer.yaml.  Orientation yaw is 0.0 (facing the
# opposite direction from the left arm's 3.1415 yaw).
#
# Motion sequence (all poses in the right_reset_station/drawer TF frame):
#   1. start_goal  — approach (retracted) pose the arm reaches BEFORE
#                    collision allowances are enabled.
#   2. reset_request.goals[0] — push forward into the drawer (insert object).
#   3. reset_request.goals[1] — retract back to the approach position.
#
# All positions are [x, y, z] in meters (REP-103); rpy is [roll, pitch, yaw]
# in radians (REP-103) relative to the named TF frame.

!ObjectResetConfig
start_goal: !PoseStamped
  position: [-0.15, 0.0, -0.065] # Approach (retracted) pose, 150 mm back from drawer along -X (meters)
  rpy: [0.0, 0.0, 0.0] # End-effector orientation — 0° yaw, facing into right drawer (radians)
  frame_id: right_reset_station/drawer # TF frame: the right reset station drawer slot
reset_request: !ConcatPlanRequest
  goals:
    - !PoseStamped
      position: [-0.067, 0.0, -0.065] # Insert pose — pushed 67 mm into drawer along -X (meters)
      rpy: [0.0, 0.0, 0.0] # Same orientation as approach (radians)
      frame_id: right_reset_station/drawer
    - !PoseStamped
      position: [-0.15, 0.0, -0.065] # Retract to approach pose — 150 mm back from drawer (meters)
      rpy: [0.0, 0.0, 0.0] # Same orientation (radians)
      frame_id: right_reset_station/drawer
  planning_pipeline: linear # Must be "linear" or "ptp" when collision allowances are active
  velocity_scaling_factor: 0.3 # Scale on joint velocity limits (0.0–1.0); slow for safe drawer contact
  acceleration_scaling_factor: 0.3 # Scale on joint acceleration limits (0.0–1.0); slow for safe drawer contact
object_allowed_collision_ids:
  - right_reset_station # Allow collision between the manipulated object and the reset station body
  - right_reset_bar # Allow collision between the manipulated object and the bar/guide rail
additional_allowed_collisions:
  - [right_eef_sphere, right_reset_station] # Allow EEF collision sphere to contact the reset station during insert
  - [right_eef_sphere, right_reset_bar] # Allow EEF collision sphere to contact the bar/guide rail during insert
