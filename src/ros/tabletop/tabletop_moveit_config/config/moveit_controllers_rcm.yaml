# MoveIt trajectory execution configuration using the ros2_control interface manager (RCM variant).
# Alternative to moveit_controllers.yaml — uses Ros2ControlManager (which discovers controllers
# dynamically from ros2_control) instead of MoveItSimpleControllerManager.
# Loaded by MoveItConfigsBuilder.trajectory_execution(file_path="config/moveit_controllers_rcm.yaml")
# when explicitly specified in a launch file.  Not used by default.
# See: https://moveit.picknik.ai/main/doc/concepts/trajectory_execution_manager.html
moveit_controller_manager: moveit_ros_control_interface/Ros2ControlManager

trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.02 # radians
  allowed_stop_tolerance: 0.02 # radians/s
  execution_duration_monitoring: true # May lead to unexpectedly aborted goals with scaled JTC
  # TODO: Change to True maybe

controller_service_call_timeout: 10.0
