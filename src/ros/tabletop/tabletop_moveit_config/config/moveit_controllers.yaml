# MoveIt trajectory execution and controller manager configuration (dual-arm rig).
# Loaded automatically by MoveItConfigsBuilder.trajectory_execution() (matches *_controllers.yaml)
# when called from commander.launch.py or moveit.launch.py.
# Configures MoveItSimpleControllerManager with the four ros2_control JTC controllers
# (left/right scaled and passthrough) and sets trajectory-execution tolerance parameters.
# See: https://moveit.picknik.ai/main/doc/concepts/trajectory_execution_manager.html
trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.02 # radians
  allowed_stop_tolerance: 0.02 # radians/s
  execution_duration_monitoring: true # May lead to unexpectedly aborted goals with scaled JTC
  # TODO: Change to True maybe

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - left_scaled_joint_trajectory_controller
    - right_scaled_joint_trajectory_controller
    - left_passthrough_trajectory_controller
    - right_passthrough_trajectory_controller

  left_scaled_joint_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - left_shoulder_pan_joint
      - left_shoulder_lift_joint
      - left_elbow_joint
      - left_wrist_1_joint
      - left_wrist_2_joint
      - left_wrist_3_joint

  right_scaled_joint_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - right_shoulder_pan_joint
      - right_shoulder_lift_joint
      - right_elbow_joint
      - right_wrist_1_joint
      - right_wrist_2_joint
      - right_wrist_3_joint

  left_passthrough_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: false
    joints:
      - left_shoulder_pan_joint
      - left_shoulder_lift_joint
      - left_elbow_joint
      - left_wrist_1_joint
      - left_wrist_2_joint
      - left_wrist_3_joint

  right_passthrough_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: false
    joints:
      - right_shoulder_pan_joint
      - right_shoulder_lift_joint
      - right_elbow_joint
      - right_wrist_1_joint
      - right_wrist_2_joint
      - right_wrist_3_joint
