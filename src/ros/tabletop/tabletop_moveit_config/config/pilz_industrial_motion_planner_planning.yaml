# MoveIt planning pipeline configuration for the Pilz Industrial Motion Planner.
# Pilz provides deterministic, time-parameterized motion types: PTP (point-to-point),
# LIN (Cartesian linear), CIRC (Cartesian arc), and blended sequences.
# This is the primary planner for deterministic, fast planning (used for fetching,
# returning, and resseting objects, as well as for deterministic cartesian paths
# in the smooth pursuit task.
# Loaded automatically by MoveItConfigsBuilder.planning_pipelines() when
# "pilz_industrial_motion_planner" is in the pipeline list (matches *_planning.yaml convention).
# Active in both commander.launch.py and moveit.launch.py.
# Cartesian velocity/acceleration limits are set separately in pilz_cartesian_limits.yaml.
# Note: AddTimeOptimalParameterization is commented out because tabletop performs its
# own time parameterization downstream, so it is not needed in the planning pipeline.
# See: https://moveit.picknik.ai/main/doc/how_to_guides/pilz_industrial_motion_planner/pilz_industrial_motion_planner.html
planning_plugins:
  - pilz_industrial_motion_planner/CommandPlanner
default_planner_config: LIN
request_adapters:
  - default_planning_request_adapters/ResolveConstraintFrames
  - default_planning_request_adapters/ValidateWorkspaceBounds
  - default_planning_request_adapters/CheckStartStateBounds
  - default_planning_request_adapters/CheckStartStateCollision
response_adapters:
  # - default_planning_response_adapters/AddTimeOptimalParameterization
  - default_planning_response_adapters/ValidateSolution
  # - default_planning_response_adapters/DisplayMotionPath
capabilities: >-
  pilz_industrial_motion_planner/MoveGroupSequenceAction
  pilz_industrial_motion_planner/MoveGroupSequenceService
