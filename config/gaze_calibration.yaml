preprocess:
  filename: preprocessed_data.csv
  eyelink_freq: 1000
  markers_freq: 120
data:
  test_size: 0.2
  val_folds: 5
  shuffle_test_split: false
  shuffle_val_split: false
  train_batch_size: 1024
  val_batch_size: 4096
  test_batch_size: 4096
model:
  class_name: GazeEstimationModelMLP
  input_size: 4
  hidden_sizes: [64, 128, 64]
  output_size: 3
  dropout_rate: 0.2
optimizer:
  class_name: AdamW
  lr: 0.001
criterion:
  class_name: MSELoss
  reduction: mean
train:
  num_epochs: 100
  patience_epochs: 10
weights_path: saved_weights/model.pt
predictions:
  filename: predictions.csv
