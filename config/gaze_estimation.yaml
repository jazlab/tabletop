# Gaze estimation configuration for the MLP (multi-layer perceptron) model.
# Consumed by:
#   - tabletop_py/gaze/calibrate.py  (full calibration pipeline: preprocess → train)
#   - tabletop_py/gaze/preprocess.py (preprocessing stage)
#   - tabletop_py/gaze/train.py      (model training stage)
#   - tabletop_py/gaze/predict.py    (online inference)
#   - tabletop_py/gaze/visualize.py  (visualization helpers)
#   - tabletop_rig/nodes/eyelink.py  (runtime inference; path set by gaze_estimation.config ROS param)
#
# This file uses a nested preprocess.eyelink / preprocess.marker structure (unlike
# gaze_estimation_geometric.yaml which uses a flat preprocess section).

# Sampling frequency of the SR Research EyeLink eye tracker (Hz).
eyelink_freq: 1000
# Sampling frequency of the OptiTrack marker system (Hz).
markers_freq: 120

preprocess:
  # Output CSV filename written to the session directory after preprocessing.
  filename: preprocessed.csv

  eyelink:
    format_columns:
      # If true, verify that the EyeLink timestamp series matches eyelink_freq within tolerances.
      verify: true
      # Relative tolerance for mean inter-sample interval vs 1/eyelink_freq.
      freq_rtol: 1.0
      # Absolute tolerance (seconds) for standard deviation of inter-sample intervals.
      freq_var_tol: 0.01
    clean:
      # EyeLink raw pupil-position values below this threshold are treated as invalid (raw units).
      min_eye_pos: -20000
      # EyeLink raw pupil-position values above this threshold are treated as invalid (raw units).
      max_eye_pos: 20000
      # Z-score threshold for outlier removal; null disables z-score filtering.
      max_zscore: null
      # max_zscore: 3.0
    reindex_and_interpolate:
      # Maximum gap (seconds) allowed when interpolating EyeLink data onto a uniform time grid;
      # samples further than this from a real observation are set to NaN.
      tolerance: 0.005
    # filter_by_speed:  # (commented out — alternate speed-based filter, not currently active)
    #   min_speed: 200    # Minimum pupil speed to keep (raw units/s); slower samples dropped.
    #   max_speed: 30000  # Maximum pupil speed to keep (raw units/s); faster samples dropped.
    #   window: 0.01      # Rolling window (seconds) around flagged samples also excluded.
    #   polyorder: 3      # Polynomial order for Savitzky-Golay derivative used in speed calc.
    smooth:
      # Smoothing algorithm: "rolling" (rolling mean) or "savgol" (Savitzky-Golay).
      method: rolling
      # Smoothing window duration (seconds).
      window: 0.02
      # Whether to center the rolling window on the current sample.
      center: true
    filter_by_speed:
      # Minimum pupil speed to keep (raw units/s); slower samples are dropped as fixations or noise.
      min_speed: 100
      # Maximum pupil speed to keep (raw units/s); faster samples are dropped as artifacts.
      max_speed: 30000
      # Rolling window (seconds) around flagged samples also excluded.
      window: 0.1

  marker:
    format_columns:
      # If true, verify that the OptiTrack marker timestamp series matches markers_freq.
      verify: true
      # Relative tolerance for mean inter-sample interval vs 1/markers_freq.
      freq_rtol: 0.01
      # Absolute tolerance (seconds) for standard deviation of inter-sample intervals.
      freq_var_tol: 0.001
      # Maximum allowed time correction (seconds) when aligning marker timestamps to
      # the EyeLink clock; raises an error if exceeded.
      max_marker_time_correction: 0.05
    clean:
      # Per-axis [x, y, z] minimum marker position (meters); null = no lower bound.
      min_pos: [null, 0.0, null]
      # Per-axis [x, y, z] maximum marker position (meters); null = no upper bound.
      max_pos: [null, null, null]
      # Z-score threshold for marker outlier removal; null disables filtering.
      max_zscore: null
    reindex_and_interpolate:
      # Maximum gap (seconds) for interpolation of marker data onto the EyeLink time grid.
      tolerance: 0.02
    transform_marker_to_led:
      # Rigid translation (meters) from the OptiTrack rigid-body origin to the LED/target position
      # on the stimulus display; applied to convert marker coordinates to gaze target coordinates.
      rel_pos: [-0.002, -0.072, 0.0]
      # rel_pos: [0.0, 0.0, 0.0]

# Dataloader settings for train/validation/test split and batch sizes.
# Used by tabletop_py/gaze/utils.py::init_dataloaders.
dataloaders:
  # Fraction of the dataset held out as the test set.
  test_size: 0.2
  # Number of K-fold cross-validation folds for the validation split.
  val_folds: 5
  # Whether to shuffle data before splitting into train/test.
  shuffle_test_split: false
  # Whether to shuffle data before splitting into train/val folds.
  shuffle_val_split: false
  # Mini-batch size for training.
  train_batch_size: 512
  # Mini-batch size for validation evaluation.
  val_batch_size: 8192
  # Mini-batch size for test evaluation.
  test_batch_size: 8192
  # Number of DataLoader worker processes for parallel data loading.
  num_workers: 8

# Separate dataloader settings used at inference time by predict.py.
test_dataloader:
  batch_size: 8192
  num_workers: 8

# Neural network model specification.
# Used by tabletop_py/gaze/models.py::GazeEstimationModelMLP.
model:
  # Model class name; must match a class in tabletop_py/gaze/models.py.
  name: GazeEstimationModelMLP
  # Number of input features: [left_x, left_y, right_x, right_y] pupil coordinates.
  input_size: 4
  # Number of output targets: [x, y, z] gaze point in world coordinates (meters).
  output_size: 3
  # hidden_sizes: [256, 512, 256]  # Alternate, larger architecture
  # List of hidden layer widths; defines depth and width of the MLP.
  hidden_sizes: [128, 256, 128]
  # Dropout probability applied after each hidden layer for regularization.
  dropout_rate: 0.2
  # If true, the input/output normalization statistics are learnable parameters.
  learn_stats: true

# torch.compile settings for accelerating inference via the Inductor backend.
# Commented out in eyelink.py at runtime — applied during training only.
compile:
  # Whether to allow dynamic tensor shapes; false = assume fixed batch sizes for better optimization.
  dynamic: false
  # # mode: max-autotune  # Uncomment to enable maximum autotuning (slower compile, faster runtime).
  # Torch compilation backend to use.
  backend: inductor
  options:
    # Enable autotuning of kernel configurations.
    max_autotune: True
    # Enable CUDA graph capture for reducing kernel launch overhead.
    triton.cudagraphs: True
    # Use coordinate descent for tuning tiling parameters.
    coordinate_descent_tuning: True
    # Fuse epilogue operations into preceding kernels.
    epilogue_fusion: true

# Optimizer settings passed to tabletop_py/gaze/utils.py::init_optimizer.
optimizer:
  # Optimizer class name from torch.optim.
  name: AdamW
  # Learning rate.
  lr: 0.001

# Loss function settings passed to tabletop_py/gaze/utils.py::init_criterion.
criterion:
  # Loss class name from torch.nn.
  name: MSELoss
  # Reduction method: "mean" averages loss over all elements.
  reduction: mean

# Training loop settings passed to tabletop_py/gaze/train.py::train.
train:
  # Maximum number of training epochs per fold.
  num_epochs: 50
  # Number of epochs without validation improvement before early stopping.
  patience_epochs: 10
  # Maximum number of CV folds to train; can be set below val_folds to save time.
  max_folds: 5

# Path to save/load model weights (.pt file).
# Supports $TABLETOP_DIR environment variable substitution.
weights_path: $TABLETOP_DIR/saved_weights/model.pt

# Output filename for test-set predictions CSV.
predictions:
  filename: predictions.csv

# Visualization settings used by tabletop_py/gaze/visualize.py.
visualize:
  animate_2d_dots:
    # X-axis range of the 2D animation (raw EyeLink pupil coordinate units).
    min_x: -30000
    max_x: 30000
    # Y-axis range of the 2D animation (raw EyeLink pupil coordinate units).
    min_y: -30000
    max_y: 30000
    # Animation frame rate (frames per second).
    fr: 10
  animate_3d_dots:
    # X-axis range of the 3D animation (meters, world frame).
    min_x: 0.0
    max_x: 1.0
    # Y-axis range of the 3D animation (meters, world frame).
    min_y: -0.5
    max_y: 0.5
    # Z-axis range of the 3D animation (meters, world frame).
    min_z: 0.0
    max_z: 1.0
    # If true, rotate gaze points from the EyeLink frame into the world frame before plotting.
    rotate_to_world: true
    # Animation frame rate (frames per second).
    fr: 10
