name: Deploy docs to GitHub Pages

# Rebuild and publish the mkdocs site on every push to main.
# Also runnable on demand from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
    # Skip runs that don't touch the docs or their toolchain.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
      # mkdocstrings reads docstrings from these sources via griffe.
      - "src/**"
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish, but only keep the newest queued run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # Install only the `docs` dependency group from uv.lock. This excludes
      # the project itself and its heavy runtime deps (torch, opencv, ROS):
      # mkdocstrings analyses src/ statically with griffe, so they aren't
      # needed to build the site.
      - name: Install docs toolchain
        run: uv sync --frozen --only-group docs

      # No --strict: mkdocs.yml intentionally sets strict: false because
      # griffe emits expected docstring warnings for ROS params read via
      # self.param() rather than function arguments.
      - name: Build site
        run: uv run --frozen --no-sync mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
